<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>PDFアップロード - 秋高考査村</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    html { overflow-y: scroll; }
    :root {
      --bg-page: linear-gradient(135deg, #f0f0f5 0%, #e8e8ee 100%);
      --bg-card: #ffffff;
      --accent: #0071e3;
      --radius: 12px;
      --transition: 0.3s ease;
      font-size: 18px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg-page);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #1d1d20;
      padding-top: 64px;
      padding-left: 32px;
      padding-right: 32px;
    }
    /* ヘッダー */
    header {
      position: fixed; top: 0; left: 0; right: 0;
      background: #ffffff; box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      z-index: 1000;
    }
    .header-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 1rem 2%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
    }
    .header-title {
      display: flex;
      gap: 19px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-start;
    }
    .site-title {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: #0071e3;
      display: inline-block;
    }
    .site-subtitle { font-size: 0.9rem; color: #6e6e73; }
    /* ナビバー */
    nav {
      width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch;
    }
    nav ul {
      display: flex; justify-content: center;
      list-style: none; margin: 0; padding: 0;
      white-space: nowrap;
    }
    nav li { margin: 0; }
    nav a {
      display: block; padding: 0.5rem 1rem;
      color: #1d1d20; text-decoration: none;
      border-bottom: 1px solid #ccc;
      transition: background 0.2s;
      flex-shrink: 0;
      font-size: 0.95rem;
      background: transparent;
    }
    nav a:hover { background: #e8ecf2; }
    nav a.active {
      background: #d0e4fd;
      border-bottom: 3px solid var(--accent);
    }
    main {
      max-width: 1400px;
      margin: 96px auto 32px;
      padding-left: 32px;
      padding-right: 32px;
      box-sizing: border-box;
    }
    h1 {
      text-align:center;
      font-size:2rem;
      margin-bottom:1rem;
      background:linear-gradient(90deg,var(--accent),#5ac8fa);
      -webkit-background-clip:text;
      color:transparent;
      /* white-space:nowrap; 削除で自動改行 */
    }
    .subtitle {
      text-align:center;
      font-size:1.2rem;
      margin-bottom:2rem;
      color:#6e6e73;
      /* white-space:nowrap; 削除で自動改行 */
    }
    .card {
      background:var(--bg-card);
      border-radius:var(--radius);
      box-shadow:0 .25rem 1rem rgba(0,0,0,.1);
      max-width:800px;
      width:100%;
      margin:0 auto 2.5rem;
      padding:0;
      transition:box-shadow var(--transition);
      box-sizing:border-box;
      word-break:break-word;
      overflow:hidden;
    }
    .card:hover {
      box-shadow:0 .5rem 1.5rem rgba(0,0,0,.15);
    }
    .card-title {
      background:#f7faff;
      padding:1.1rem 2rem;
      font-size:1.15rem;
      font-weight:bold;
      color:var(--accent);
      border-bottom:1px solid #e0e0e0;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:space-between;
      user-select:none;
    }
    .card-title .step-label {
      font-size:1.05rem;
      font-weight:bold;
      color:var(--accent);
      margin-right:.7em;
    }
    .card-title .back-btn {
      font-size:.98rem;
      color:#0071e3;
      background:none;
      border:none;
      cursor:pointer;
      margin-left:auto;
      padding:.2em .8em;
      border-radius:6px;
      transition:background .2s;
    }
    .card-title .back-btn:hover {
      background:#e6f2ff;
    }
    .free-mode-status {
      min-width: 120px;
      text-align: right;
      font-size: 0.92rem;
      font-weight: bold;
      padding: 0.25em 0.9em;
      border-radius: 6px;
      margin-left: 1.5em;
      margin-right: 0.2em;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      height: 2.1em;
      box-sizing: border-box;
    }
    .free-mode-status.free {
      background: #00d084;
      color: #fff;
    }
    .free-mode-status.ad {
      background: #e0e0e0;
      color: #444;
    }
    /* コピー用トースト */
    #copyToast {
      display: none;
      opacity: 0;
      position: fixed;
      left: 50%;
      bottom: 2.5rem;
      transform: translateX(-50%);
      background: #333;
      color: #ffffff20;
      padding: 0.6em 1.5em;
      border-radius: 1.2em;
      font-size: 0.98em;
      z-index: 2000;
      transition: opacity 0.4s;
      pointer-events: none;
      min-width: 7em;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.18);
    }
    @media (max-width: 1200px) {
      main {
        max-width: 100vw;
        padding-left: 8px;
        padding-right: 8px;
      }
      .card {
        max-width: 600px;
        min-width: 280px;
      }
    }
  </style>
  <script src="js/api.js"></script>
</head>

<body>
  <header>
    <div class="header-inner">
      <div class="header-title">
        <div class="site-title">秋高考査村</div>
        <div class="site-subtitle">無料・匿名で使える過去問共有サイト</div>
      </div>
      <div id="freeModeStatus" class="free-mode-status"></div>
      <nav>
        <ul>
          <li><a href="index.html" target="_top">ホーム</a></li>
          <li><a href="upload.html" target="_top">アップロード</a></li>
          <li><a href="search.html" target="_top">問題データベース</a></li>
          <li><a href="share.html" class="active" target="_top">共有・拡散</a></li>
          <li><a href="https://c.kuku.lu/hmc853pz" target="_blank">掲示板</a></li>
          <li><a href="https://forms.gle/ZWtQCvecH4eZtTEU7" target="_blank">報告・問い合わせ</a></li>
        </ul>
      </nav>
    </div>
  </header>
  <main>
    <h1>共有・拡散</h1>
    <div class="subtitle">このサイトを友達やクラスに広めてください</div>
    <div class="card" style="text-align:center; padding:2.2rem 1.5rem 2.5rem 1.5rem; max-width:min(96vw, 600px);">
      <div style="font-size:1.13rem; color:#333; margin-bottom:1.2em; line-height:1.7;">
        秋高考査村を友達やクラス、学校に広めて<br>みんなで過去問を共有しよう
      </div>
      <div style="margin:1.2em 0 0.5em 0; display:flex; gap:0.5em; align-items:center; justify-content:center; flex-wrap:wrap;">
        <input type="text" id="siteUrl" class="share-url-input" value="https://script.google.com/macros/s/AKfycbwEAhdiJOtbf44ifY-BoAFhLI7eQl_uIJKm9NDTexoWZD7U8l-7wsrT9ufRCZ9d8lZf/exec?page=index" readonly style="width:18em; max-width:90vw; font-size:1.05em; padding:0.5em 0.7em; border:1px solid #d1d1d6; border-radius:8px; background:#f9f9fb; color:#333;">
      </div>
      <div style="display:flex; justify-content:center; margin-bottom:0.5em;">
        <button class="copy-btn" id="copyBtn" onclick="copyButton('siteUrl')" style="background:var(--accent); color:#fff; border:none; border-radius:8px; padding:0.5em 1.2em; font-size:1em; cursor:pointer; transition:background 0.2s; margin-left:0.2em; display:flex; align-items:center; gap:0.5em;"><i class="fa-regular fa-copy"></i> コピー</button>
      </div>
      <div style="height:2.2em; width:100%; display:flex; align-items:center; justify-content:center; margin-bottom:1.2em;">
        <div id="copyToast" style="display:none; opacity:0; background:#fff; color:#111; padding:0.35em 1em; border-radius:1em; font-size:0.93em; min-width:6em; text-align:center; box-shadow:0 2px 8px rgba(0,0,0,0.13); transition:opacity 0.4s; pointer-events:none; font-weight:normal; letter-spacing:0.01em;">コピーしました！</div>
      </div>
      <div class="share-buttons" style="display:flex; flex-wrap:wrap; gap:1em; justify-content:center; margin-bottom:1.2em;">
        <a
          id="twitterBtn"
          href="https://twitter.com/intent/tweet?text=無料で使える過去問共有サイト「秋高考査村」%0A考査問題に限らず、テスト問題をアップロード・閲覧できるサービスです。%0A%0Ahttps://akt-kosamura.github.io/kosamura/%0A%0A%23考査村%20%23過去問"
          class="share-btn"
          style="background:#fff; color:var(--accent); border:1.5px solid var(--accent); border-radius:8px; font-size:1.05rem; font-weight:bold; cursor:pointer; padding:0.7rem 1.5rem; transition:background 0.2s, color 0.2s; display:flex; align-items:center; gap:0.5em; text-decoration:none;"
          target="_blank" rel="noopener noreferrer"
        >
          <i class="fa-brands fa-twitter"></i><span style="margin-left:0.5em;">ツイート</span>
        </a>
        <button class="share-btn" id="nativeShareBtn" style="background:#fff; color:var(--accent); border:1.5px solid var(--accent); border-radius:8px; font-size:1.05rem; font-weight:bold; cursor:pointer; padding:0.7rem 1.5rem; transition:background 0.2s, color 0.2s; display:flex; align-items:center; gap:0.5em;"><i class="fa-solid fa-share-nodes"></i><span style="margin-left:0.5em;">共有</span></button>
      </div>
      <button class="print-btn" onclick="window.print()" style="display:block; margin:1.2rem auto 0 auto; padding:0.7rem 2.2rem; background:#fff; color:var(--accent); border:1.5px solid var(--accent); border-radius:8px; font-size:1.05rem; font-weight:bold; cursor:pointer; transition:background 0.2s, color 0.2s;"><i class="fa-solid fa-print"></i> 印刷して配布</button>
      <div style="margin-top:1.5em; color:#888; font-size:0.98em;">
        ※Googleドライブのファイルリンクは後日掲載予定です
      </div>
    </div>
  </main>
  <div class="copyright-note">Copyright© 2020 考査村 All Rights Reserved.</div><br>
  <style>
    .copyright-note {
      font-size: 20px;
      color: #888;
      text-align: center;
      margin-top: 18px;
      margin-bottom: 18px;
    }
  </style>

  <script>
    // フリーモードカウントダウン
    function isInFreeMode() {
      const freeModeEnd = localStorage.getItem('freeModeEnd')
      if (!freeModeEnd) return false
      return new Date().getTime() < parseInt(freeModeEnd)
    }
    function updateFreeModeStatus() {
      const status = document.getElementById('freeModeStatus')
      if (!status) return
      if (isInFreeMode()) {
        const freeModeEnd = parseInt(localStorage.getItem('freeModeEnd'))
        const remaining = freeModeEnd - new Date().getTime()
        if (remaining <= 0) {
          localStorage.removeItem('freeModeEnd')
          status.textContent = '問題アップロードで広告フリー'
          status.className = 'free-mode-status ad'
          return
        }
        const hours   = Math.floor(remaining / (60 * 60 * 1000))
        const minutes = Math.floor((remaining % (60 * 60 * 1000)) / (60 * 1000))
        const seconds = Math.floor((remaining % (60 * 1000)) / 1000)
        status.textContent = `フリーモード ${hours}時間${minutes}分${seconds}秒`
        status.className = 'free-mode-status free'
      } else {
        status.textContent = '問題アップロードで広告フリー'
        status.className = 'free-mode-status ad'
      }
    }
    document.addEventListener('DOMContentLoaded', () => {
      updateFreeModeStatus()
      setInterval(updateFreeModeStatus, 1000)
    })
  </script>

  <script>
    function copyButton(elementId) {
      var element = document.getElementById(elementId);
      navigator.clipboard.writeText(element.value || element.textContent);
      // トースト表示
      var toast = document.getElementById('copyToast');
      toast.style.display = 'block';
      setTimeout(function() { toast.style.opacity = 1; }, 10);
      setTimeout(function() {
        toast.style.opacity = 0;
        setTimeout(function() { toast.style.display = 'none'; }, 400);
      }, 1600);
      // ボタンデザイン変更
      var btn = document.getElementById('copyBtn');
      var originalBg = btn.style.background;
      var originalColor = btn.style.color;
      btn.style.background = '#e0e0e0';
      btn.style.color = '#0071e3';
      btn.innerHTML = '<i class="fa-regular fa-copy"></i> コピーしました！';
      setTimeout(function() {
        btn.style.background = originalBg;
        btn.style.color = originalColor;
        btn.innerHTML = '<i class="fa-regular fa-copy"></i> コピー';
      }, 1400);
    }
  </script>

  <script>
  document.addEventListener('DOMContentLoaded', () => {
    const urlInput  = document.getElementById('siteUrl')
    const copyBtn   = document.getElementById('copyBtn')
    const twitterBtn= document.getElementById('twitterBtn')
    const shareBtn  = document.getElementById('nativeShareBtn')
    const toast     = document.getElementById('copyToast')

    // ネイティブ共有
    shareBtn.addEventListener('click', async () => {
      const shareData = {
        title: '秋高考査村',
        text: '無料で使える問題共有サイト',
        url: urlInput.value
      }
      if (navigator.share) {
        try {
          await navigator.share(shareData)
        } catch (err) {
          console.error('共有に失敗しました', err)
        }
      } else {
        toast.textContent = 'この端末は共有非対応です。URLをコピーして使ってください'
        toast.style.display = 'block'
        setTimeout(() => { toast.style.opacity = 1 }, 10)
        setTimeout(() => {
          toast.style.opacity = 0
          setTimeout(() => {
            toast.style.display = 'none'
            toast.textContent = 'コピーしました！'
          }, 400)
        }, 2000)
      }
    })
  })
  </script>

</body>
</html>
