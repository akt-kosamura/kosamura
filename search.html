<body>
  <header>
    <div class="header-inner">
      <div class="header-title">

        <div class="site-subtitle">無料・匿名で使える過去問共有サイト</div>

  <div class="page-container">
    <h1>問題データベース</h1>

    <div class="filter-section">
      <div class="filter-row">

            <option value="">指定しない</option>

        <div class="filter-group">
          <label for="year">年度</label>

                <option>2021（R3）</option>
                <option>2022（R4）</option>

        </div>

        <div class="filter-group">
          <label for="type">種類</label>
          <select id="type">
            <option value="">指定しない</option>
            <option>前期中間</option>
            <option>前期期末</option>
            <option>後期中間</option>
            <option>後期期末</option>
            <option>考査以外</option>

        <div class="filter-group">
          <label for="subject">科目</label>

            <option>言文・古探</option>
            <option>数学Ⅰ・Ⅱ・Ⅲ</option>
            <option>数学Ａ・Ｂ・Ｃ</option>
            <option>英語コミュ</option>
            <option>論理表現</option>
            <option>化学・化学基礎</option>
            <option>生物・生物基礎</option>
            <option>物理・物理基礎</option>
            <option>地学・地学基礎</option>
            <option>地理</option>
            <option>日本史</option>
            <option>世界史</option>
            <option>公共</option>
            <option>情報</option>
            <option>保健体育</option>
            <option>家庭科</option>
            <option>国語</option>
            <option>数学</option>
            <option>理科</option>
            <option>英語</option>
            <option>地歴</option>
            <option>その他</option>
          </select>
        </div>

        <div class="filter-group">
          <label for="stream">文理区分</label>
          <select id="stream">
            <option value="">指定しない</option>
            <option>区分なし</option>
            <option>理系のみ</option>
            <option>文系のみ</option>
            <option>理数科のみ</option>
          </select>
        </div>

        <div class="filter-group">
          <label for="contentType">内容</label>
          <select id="contentType">
            <option value="">指定しない</option>
            <option>問題</option>
            <option>解答</option>
            <option>解説</option>
            <option>セット</option>
          </select>
        </div>

        <div class="filter-group">
          <label for="formatSelect">ファイル形式</label>
          <select id="formatSelect">
            <option value="">指定しない</option>
            <option>PDF</option>
            <option>Word</option>
            <option>Excel</option>
            <option>一太郎</option>
            <option>画像</option>
          </select>
        </div>

        <div class="filter-buttons">
          <button id="btnClearFilters">解除</button>
          <button id="btnRefresh">更新</button>
        </div>

    </div>

    <div class="controls-section">
      <div class="controls-left">
        <label><input type="checkbox" id="toggleDate" checked> アップロード</label>
        <label><input type="checkbox" id="toggleFormatCol"> 形式</label>
        <label><input type="checkbox" id="toggleEval" checked> 評価</label>
        <label>
          コメント表示：
          <select id="commentMode">
            <option value="compact">1行表示</option>
            <option value="lines3">3行表示</option>
            <option value="none">非表示</option>
          </select>
        </label>
      </div>
      <div class="controls-right">
        <label>並び順：</label>
        <select id="sortMenu">
          <option value="upload_desc">アップロード順▼</option>
          <option value="upload_asc">アップロード順▲</option>
          <option value="year_desc">年度順▼</option>
          <option value="year_asc">年度順▲</option>
        </select>
      </div>
    </div>

    <!-- 横スクロール誘導アニメーション（テーブルエリアオーバーレイ） -->
    <div id="scroll-hint-overlay" style="position:absolute;left:0;right:0;top:0;bottom:0;z-index:2000;background:rgba(0,0,0,0.22);display:flex;align-items:center;justify-content:center;transition:opacity 0.5s;pointer-events:none;">
      <div id="scroll-hint" style="background:rgba(30,30,30,0.75);border-radius:1.2rem;padding:1.1rem 1.5rem;box-shadow:0 2px 16px rgba(0,0,0,0.18);text-align:center;pointer-events:auto;">
        <span style="display:inline-block;font-size:1.2em;color:#fff;user-select:none;font-weight:500;letter-spacing:0.05em;">
          <span id="scroll-arrow" style="display:inline-block;transition:transform 0.5s;">⇆</span>
          <span style="margin-left:0.5em;">表は横スクロールできます</span>
        </span>
      </div>
    </div>
    <div class="table-container">
      <table class="table-card">
        <thead>
          <tr>
            <th>学年</th>
            <th>年度</th>
            <th>種類</th>
            <th>科目</th>
            <th>文理区分</th>
            <th>内容</th>
            <th class="col-format">形式</th>
            <th>リンク</th>
            <th class="col-comment">コメント</th>
            <th class="col-date">アップロード</th>
            <th class="col-eval">評価</th>
          </tr>
        </thead>
        <tbody id="resultBody">
          <tr id="loadingRow">
            <td colspan="11" style="text-align:center;color:#666">読み込み中…（表は横スクロール対応）</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
<div class="copyright-note">Copyright© 2020 考査村 All Rights Reserved.</div><br>
<style>
.copyright-note {
  font-size: 20px;
  color: #888;
  text-align: center;
  margin-top: 18px;
  margin-bottom: 18px;
}
</style>

<script>
  function isInFreeMode() {
    const freeModeEnd = localStorage.getItem('freeModeEnd');
    if (!freeModeEnd) return false;
    return new Date().getTime() < parseInt(freeModeEnd);
  }

  function updateFreeModeStatus() {
    const status = document.getElementById('freeModeStatus');
    if (isInFreeMode()) {
      const freeModeEnd = parseInt(localStorage.getItem('freeModeEnd'));
      const remaining = freeModeEnd - new Date().getTime();
      if (remaining <= 0) {
        localStorage.removeItem('freeModeEnd');
        status.textContent = '問題アップロードで広告フリー';
        status.className = 'free-mode-status ad';
        return;
      }
      const hours = Math.floor(remaining / (60 * 60 * 1000));
      const minutes = Math.floor((remaining % (60 * 60 * 1000)) / (60 * 1000));
      const seconds = Math.floor((remaining % (60 * 1000)) / 1000);
      status.textContent = `フリーモード ${hours}時間${minutes}分${seconds}秒`;
      status.className = 'free-mode-status free';
    } else {
      status.textContent = '問題アップロードで広告フリー';
      status.className = 'free-mode-status ad';
    }
  }
  // --- フィルター用グローバル変数を追加 ---
  const filter = {
    grade: '',
    year: '',
    type: '',
    subject: '',
    stream: '',
    contentType: '',
    format: ''
  };

  // 広告ポップアップ表示（通常モード）
function showAdPopup(fileUrl) {
  const overlay = document.createElement('div');
  overlay.className = 'popup-overlay';
  overlay.innerHTML = `
    <div class="popup-content">
      <button class="popup-close">&times;</button>
      <h2>広告を視聴してファイルを開く</h2>
      <div class="countdown-text" id="countdownText">180</div>
      <p id="statusText">カウントダウン中…</p>
      <div class="ad-video">
        <iframe src="https://www.youtube.com/embed/FWlckcAayE4?autoplay=1&mute=0&controls=0&modestbranding=1&rel=0&iv_load_policy=3"
                frameborder="0" allow="autoplay; encrypted-media"></iframe>
      </div>
    </div>`;
  document.body.appendChild(overlay);

  let countdown = 10;
  const countdownEl = overlay.querySelector('#countdownText');
  const statusEl    = overlay.querySelector('#statusText');
  const timer = setInterval(() => {
    countdown--;
    countdownEl.textContent = countdown;
    if (countdown <= 0) {
      clearInterval(timer);
      statusEl.textContent = '';  // ステータスは消す

      // ↓ダウンロードボタン風にデザインを変更↓
      countdownEl.textContent = 'ファイル表示';
      countdownEl.style.cursor = 'pointer';
      // 背景薄い青
      countdownEl.style.backgroundColor = '#e0f5ff';
      // 枠は濃い青
      countdownEl.style.border = '1px solid #0071e3';
      // 文字色は濃い青
      countdownEl.style.color = '#005bb5';
      // 少し丸角
      countdownEl.style.borderRadius = '6px';
      countdownEl.style.padding = '0.4rem 0.8rem';

      countdownEl.onclick = () => {
        window.open(fileUrl, '_blank', 'noopener,noreferrer');
        document.body.removeChild(overlay);
      };
    }
  }, 1000);


  overlay.querySelector('.popup-close').onclick = () => {
    clearInterval(timer);
    document.body.removeChild(overlay);
  };
  overlay.onclick = e => {
    if (e.target === overlay) {
      clearInterval(timer);
      document.body.removeChild(overlay);
    }
  };
}
  // 動画読み込み完了時の処理
  function videoLoaded() {
    setTimeout(() => {
      const statusElement = document.getElementById('statusText');
      if (statusElement) {
        statusElement.textContent = '動画再生中... カウントダウン後にファイルが開きます';
      }
    }, 2000);
  }

  // 「見る」リンクの処理
  function attachHandlers() {
    document.querySelectorAll('.view-link').forEach(link => {
      link.onclick = e => {
        e.preventDefault();
        const fileUrl = link.dataset.url;
        if (isInFreeMode()) {
          // フリーモードなら直接開く
          window.open(fileUrl, '_blank', 'noopener,noreferrer');
        } else {
          // 通常モードはポップアップ
          showAdPopup(fileUrl);
        }
      };
    });

    document.querySelectorAll('.btn-like').forEach(btn => {
      btn.onclick = async () => {
        // 連続クリック防止
        if (btn.disabled) return;
        btn.disabled = true;
        
        const id = btn.dataset.id;
        const prev = localStorage.getItem('vote_' + id);
        const tr = btn.closest('tr');
        const badBtn = tr.querySelector('.btn-bad');
        let count = parseInt(btn.textContent.replace(/\D/g,''), 10);
        
        try {
          if (prev === 'good') {
            // いいねを取り消し
            btn.classList.remove('active');
            localStorage.removeItem('vote_' + id);
            btn.textContent = `❤ ${--count}`;
            
            // データベース更新
            await kosamuraAPI.unlike(Number(id));
          } else {
            // 反対の評価があれば取り消し
            if (prev === 'bad') {
              let bc = parseInt(badBtn.textContent.replace(/\D/g,''), 10);
              badBtn.classList.remove('active');
              localStorage.removeItem('vote_' + id);
              badBtn.textContent = `👎 ${--bc}`;
              
              // バッド取り消しを先に実行
              await kosamuraAPI.unbad(Number(id));
            }
            
            // いいねを追加
            btn.classList.add('active');
            localStorage.setItem('vote_' + id, 'good');
            btn.textContent = `❤ ${++count}`;
            
            // データベース更新
            await kosamuraAPI.like(Number(id));
          }
        } catch (e) {
          console.error('いいね処理エラー:', e);
          // エラー時は元の状態に戻す
          if (prev === 'good') {
            btn.classList.add('active');
            localStorage.setItem('vote_' + id, 'good');
            btn.textContent = `❤ ${++count}`;
          } else {
            btn.classList.remove('active');
            localStorage.removeItem('vote_' + id);
            btn.textContent = `❤ ${--count}`;
          }
        } finally {
          // ボタンを再度有効化
          setTimeout(() => {
            btn.disabled = false;
          }, 1000); // 1秒後に再度クリック可能
        }
      };
    });
    document.querySelectorAll('.btn-bad').forEach(btn => {
      btn.onclick = async () => {
        // 連続クリック防止
        if (btn.disabled) return;
        btn.disabled = true;
        
        const id = btn.dataset.id;
        const prev = localStorage.getItem('vote_' + id);
        const tr = btn.closest('tr');
        const likeBtn = tr.querySelector('.btn-like');
        let count = parseInt(btn.textContent.replace(/\D/g,''), 10);
        
        try {
          if (prev === 'bad') {
            // バッドを取り消し
            btn.classList.remove('active');
            localStorage.removeItem('vote_' + id);
            btn.textContent = `👎 ${--count}`;
            
            // データベース更新
            await kosamuraAPI.unbad(Number(id));
          } else {
            // 反対の評価があれば取り消し
            if (prev === 'good') {
              let lc = parseInt(likeBtn.textContent.replace(/\D/g,''), 10);
              likeBtn.classList.remove('active');
              localStorage.removeItem('vote_' + id);
              likeBtn.textContent = `❤ ${--lc}`;
              
              // いいね取り消しを先に実行
              await kosamuraAPI.unlike(Number(id));
            }
            
            // バッドを追加
            btn.classList.add('active');
            localStorage.setItem('vote_' + id, 'bad');
            btn.textContent = `👎 ${++count}`;
            
            // データベース更新
            await kosamuraAPI.bad(Number(id));
          }
        } catch (e) {
          console.error('バッド処理エラー:', e);
          // エラー時は元の状態に戻す
          if (prev === 'bad') {
            btn.classList.add('active');
            localStorage.setItem('vote_' + id, 'bad');
            btn.textContent = `👎 ${++count}`;
          } else {
            btn.classList.remove('active');
            localStorage.removeItem('vote_' + id);
            btn.textContent = `👎 ${--count}`;
          }
        } finally {
          // ボタンを再度有効化
          setTimeout(() => {
            btn.disabled = false;
          }, 1000); // 1秒後に再度クリック可能
        }
      };
    });
  }

  // 相対時間表示関数
  function formatRelativeTime(dateStr) {
    try {
      const date = new Date(dateStr);
      const now = new Date();
      const diffMs = now.getTime() - date.getTime();
      const diffSec = Math.floor(diffMs / 1000);
      const diffMin = Math.floor(diffSec / 60);
      const diffHour = Math.floor(diffMin / 60);
      const diffDay = Math.floor(diffHour / 24);

      if (diffDay >= 1) {
        return `${diffDay}日前`;
      } else if (diffHour >= 1) {
        return `${diffHour}時間前`;
      } else if (diffMin >= 1) {
        return `${diffMin}分前`;
      } else {
        return `${diffSec}秒前`;
      }
    } catch (error) {
      return dateStr;
    }
  }

  // データ取得
  async function fetchData() {
    const tbody = document.getElementById('resultBody');
    tbody.innerHTML = '<tr id="loadingRow"><td colspan="11" style="text-align:center;color:#666">読み込み中…（表は横スクロール対応）</td></tr>';
    try {
      const data = await kosamuraAPI.getData();
      buildRows(data);
    } catch (error) {
      console.error('データ取得エラー:', error);
      tbody.innerHTML = '<tr><td colspan="11" style="text-align:center;color:red;">データの取得に失敗しました: ' + error.message + '</td></tr>';
    }
  }

  // 結果描画
  function buildRows(data) {
    const tbody = document.getElementById('resultBody');
    tbody.innerHTML = '';
    if (!data || data.length === 0) {
      tbody.innerHTML = '<tr><td colspan="11" style="text-align:center;color:#666">データがありません</td></tr>';
      return;
    }
    data.forEach(item => {
      const vt = localStorage.getItem('vote_' + item.id);
      const tr = document.createElement('tr');
      ['grade','year','type','subject','stream','contentType','format'].forEach(k => {
        tr.dataset[k] = String(item[k] || '');
      });
      tr.dataset.date = String(item.date || '');
      const safe = String(item.comment || '').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      const rel = formatRelativeTime(item.date);
      tr.innerHTML = `
        <td>${String(item.grade || '')}</td>
        <td>${String(item.year || '')}</td>
        <td>${String(item.type || '')}</td>
        <td>${String(item.subject || '')}</td>
        <td>${String(item.stream || '')}</td>
        <td>${String(item.contentType || '')}</td>
        <td class="format-cell">${String(item.format || '')}</td>
        <td><a href="#" class="view-link" data-url="${String(item.url || '')}">見る</a></td>
        <td class="comment-cell" data-comment="${safe}"><div class="comment-text">${safe}</div></td>
        <td class="col-date date-cell">${rel}</td>
        <td class="col-eval eval-cell">
          <button class="btn-like${vt==='good'?' active':''}" data-id="${item.id}">❤ ${item.likes || 0}</button>
          <button class="btn-bad${vt==='bad'?' active':''}" data-id="${item.id}">👎 ${item.bad || 0}</button>
        </td>`;
      tbody.appendChild(tr);
    });
    attachHandlers();
    applyFilters();
    applySort();
    applyColumns();
  }

  // フィルタ適用
  function applyFilters() {
    document.querySelectorAll('#resultBody tr').forEach(tr => {
      if (!tr.dataset) return;
      const ok = ['grade','year','type','subject','stream','contentType','format']
        .every(k => !filter[k] || tr.dataset[k] === filter[k]);
      tr.style.display = ok ? '' : 'none';
    });
  }

  // ソート適用
  function applySort() {
    const mode = document.getElementById('sortMenu').value;
    const tb = document.getElementById('resultBody');
    const rows = Array.from(tb.children).filter(r => r.style.display!=='none' && r.dataset.date);

    rows.sort((a,b) => {
      if (mode === 'upload_desc') {
        return new Date(b.dataset.date) - new Date(a.dataset.date);
      }
      if (mode === 'upload_asc') {
        return new Date(a.dataset.date) - new Date(b.dataset.date);
      }
      if (mode === 'year_desc') {
        return parseInt(b.children[1].textContent) - parseInt(a.children[1].textContent);
      }
      if (mode === 'year_asc') {
        return parseInt(a.children[1].textContent) - parseInt(b.children[1].textContent);
      }
      return 0;
    });
    rows.forEach(r => tb.appendChild(r));
  }

  // カラム表示制御
  function applyColumns() {
    document.querySelectorAll('.col-date').forEach(c => c.classList.toggle('hidden-col', !document.getElementById('toggleDate').checked));
    document.querySelectorAll('.format-cell').forEach(c => c.classList.toggle('hidden-col', !document.getElementById('toggleFormatCol').checked));
    document.querySelectorAll('th.col-format').forEach(th => th.classList.toggle('hidden-col', !document.getElementById('toggleFormatCol').checked));
    document.querySelectorAll('.col-eval').forEach(c => c.classList.toggle('hidden-col', !document.getElementById('toggleEval').checked));

    const mode = document.getElementById('commentMode').value;
    document.querySelectorAll('th.col-comment, td.comment-cell').forEach(el => el.classList.toggle('hidden-col', mode==='none'));
    document.querySelectorAll('.comment-cell .comment-text').forEach(box => {
      const td = box.parentElement;
      td.querySelectorAll('a.extra-link').forEach(a => a.remove());
      box.style.overflow = 'hidden';
      box.style.display = '-webkit-box';
      box.style.webkitBoxOrient = 'vertical';
      if (mode === 'compact') {
        box.style.webkitLineClamp = '1';
        box.style.maxHeight = '1.4em';
      } else if (mode === 'lines3') {
        box.style.webkitLineClamp = '3';
        box.style.maxHeight = 'calc(3 * 1.4em)';
      } else if (mode === 'none') {
        return;
      } else {
        box.style.webkitLineClamp = 'none';
        box.style.maxHeight = 'none';
        box.style.overflow = 'visible';
        box.style.display = 'block';
      }
      const raw = td.dataset.comment || '';
      const lines = raw.split('\n').length;
      const chars = raw.length;
      const shouldTruncate = (mode==='lines3' && lines>3) || (mode==='compact' && (lines>1||chars>100));
      if (shouldTruncate && raw.trim()) {
        const more = document.createElement('a');
        more.href = '#'; more.textContent = '...もっと読む'; more.className = 'extra-link';
        more.onclick = e => {
          e.preventDefault();
          box.style.webkitLineClamp = 'none';
          box.style.maxHeight = 'none';
          box.style.overflow = 'visible';
          box.style.display = 'block';
          more.remove();
          const less = document.createElement('a');
          less.href = '#'; less.textContent = '折りたたむ'; less.className = 'extra-link';
          less.onclick = ev => { ev.preventDefault(); applyColumns(); };
          td.appendChild(less);
        };
        td.appendChild(more);
      }
    });
  }

  document.addEventListener('DOMContentLoaded', () => {
    updateFreeModeStatus();
    setInterval(updateFreeModeStatus, 1000);
    ['grade','year','type','subject','stream','contentType'].forEach(id => {
      document.getElementById(id).onchange = e => { filter[id] = e.target.value; applyFilters(); };
    });
    document.getElementById('formatSelect').onchange = e => { filter.format = e.target.value; applyFilters(); };
    document.getElementById('btnClearFilters').onclick = () => {
      ['grade','year','type','subject','stream','contentType','format'].forEach(k => {
        const el = k==='format' ? document.getElementById('formatSelect') : document.getElementById(k);
        el.value = ''; filter[k] = '';
      });
      applyFilters();
    };
    document.getElementById('btnRefresh').onclick = fetchData;
    document.getElementById('toggleDate').onchange = applyColumns;
    document.getElementById('toggleFormatCol').onchange = applyColumns;
    document.getElementById('toggleEval').onchange = applyColumns;
    document.getElementById('commentMode').onchange = applyColumns;
    document.getElementById('sortMenu').onchange = applySort;
    applyColumns();
    fetchData();

    // 横スクロール誘導アニメーションを数秒だけ表示（オーバーレイ）
    const overlay = document.getElementById('scroll-hint-overlay');
    const hint = document.getElementById('scroll-hint');
    const arrow = document.getElementById('scroll-arrow');
    let dir = 1, count = 0;
    const anim = setInterval(() => {
      arrow.style.transform = `translateX(${dir*32}px)`;
      dir *= -1;
      count++;
      if(count > 5) { // 3往復で消す
        clearInterval(anim);
        overlay.style.opacity = 0;
        setTimeout(()=>{ overlay.style.display = 'none'; }, 600);
      }
    }, 400);
  });
</script>
<script src="js/api.js"></script>
</body>
