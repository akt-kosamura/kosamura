<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>問題データベース - 秋高秋高考査村</title>
  <style>
    html { overflow-y: scroll; }
    :root {
      --bg-page: linear-gradient(135deg, #f0f0f5 0%, #e8e8ee 100%);
      --bg-card: #ffffff;
      --accent: #0071e3;
      --radius: 12px;
      --transition: 0.3s ease;
      font-size: 1.1rem;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg-page);
      color: #1d1d20;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding-top: 64px;
      padding-left: 32px;
      padding-right: 32px;
      font-size: 16px;
    }
    
    header {
      position: fixed; top: 0; left: 0; right: 0;
      background: #ffffff; box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      z-index: 1000;
    }
    .header-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 16px 2%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
    }
    .header-title {
      display: flex;
      gap: 19px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-start;
    }
    .site-title {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: #0071e3;
      display: inline-block;
    }
    .site-subtitle { font-size: 0.9rem; color: #6e6e73; }
    .free-mode-timer {
      background: #00d084;
      color: white;
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
      font-size: 0.8rem;
      font-weight: bold;
    }
    nav { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; }
    nav ul { display: flex; justify-content: center; list-style: none; white-space: nowrap; }
    nav a {
      display: block; padding: 0.5rem 1rem;
      color: #1d1d20; text-decoration: none;
      border-bottom: 1px solid #ccc;
      transition: background 0.2s;
      font-size: 0.95rem;
    }
    nav a:hover { background: #e8ecf2; }
    nav a.active {
      background: #d0e4fd;
      border-bottom: 3px solid var(--accent);
    }
    
    .page-container {
      max-width: 1400px;
      margin: 96px auto 32px;
      padding-left: 32px;
      padding-right: 32px;
      box-sizing: border-box;
    }
    
    h1 {
      text-align: center; font-size: 2rem;
      margin-bottom: 1rem;
      background: linear-gradient(90deg, var(--accent), #5ac8fa);
      -webkit-background-clip: text; 
      color: transparent;
    }
    .subtitle {
      text-align: center; font-size: 1.2rem;
      margin-bottom: 2rem; color: #6e6e73;
    }
    
    .filter-section {
      background: var(--bg-card); 
      border-radius: var(--radius);
      padding: 1.5rem; 
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
      margin-bottom: 1.5rem;
    }
    
    .filter-row {
      display: flex; 
      flex-wrap: wrap; 
      justify-content: center;
      align-items: center; 
      gap: 1rem;
    }
    
    .filter-group {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    
    .filter-group label {
      font-size: 0.9rem; 
      color: #666;
      white-space: nowrap;
    }
    
    .filter-group select {
      padding: 0.5rem; 
      border: 1px solid #ccc;
      border-radius: 4px; 
      font-size: 0.9rem;
      min-width: 120px;
    }
    
    .filter-buttons {
      display: flex;
      gap: 0.5rem;
    }
    
    #btnClearFilters, #btnRefresh {
      padding: 0.5rem 1rem; 
      font-size: 0.9rem;
      background: #e0f0ff; 
      color: var(--accent);
      border: 1px solid #c0e0ff; 
      border-radius: 4px;
      cursor: pointer; 
      font-weight: bold;
      transition: background var(--transition), transform .2s;
    }
    #btnClearFilters:hover, #btnRefresh:hover {
      background: #d0eaff; 
      transform: translateY(-1px);
    }
    
    .controls-section {
      background: var(--bg-card);
      border-radius: var(--radius);
      padding: 1rem 1.5rem;
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
      margin-bottom: 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
    }
    
    .controls-left, .controls-right {
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }
    
    .controls-left label {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.9rem;
      color: #666;
    }
    
    .controls-right {
      gap: 0.5rem;
    }
    
    .controls-right select {
      padding: 0.5rem;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 0.9rem;
    }
    
    .table-container {
      background: var(--bg-card);
      border-radius: var(--radius);
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    
    .table-card {
      width: 100%; 
      border-collapse: collapse;
      min-width: 1300px;
    }
    
    .table-card th, .table-card td {
      padding: 12px; 
      vertical-align: top;
      border-bottom: 1px solid #eaeaea; 
      font-size: 0.9rem;
      white-space: nowrap;
      text-align: left;
    }
    
    .table-card th {
      background: #f7f7f9; 
      color: #666;
      font-weight: 600;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    
    .table-card td.comment-cell { 
      width: 300px;
      min-width: 300px;
      max-width: 300px;
      white-space: normal;
    }
    
    .table-card td.format-cell { 
      width: 100px;
      min-width: 100px;
    }
    
    .table-card td.date-cell {
      width: 120px;
      min-width: 120px;
    }
    
    .table-card td.eval-cell {
      width: 160px;
      min-width: 160px;
    }
    
    th.hidden-col, td.hidden-col { display: none; }
    
    .comment-text { 
      overflow: hidden; 
      white-space: pre-wrap;
      word-wrap: break-word;
      line-height: 1.4;
    }
    
    .table-card tbody tr {
      transition: background var(--transition);
    }
    .table-card tbody tr:hover {
      background: #f8f9fa;
    }
    
    .btn-like, .btn-bad {
      display: inline-flex; 
      align-items: center; 
      justify-content: center;
      padding: 4px 8px; 
      margin-right: 8px; 
      border-radius: 4px;
      border: 1px solid transparent; 
      background: transparent;
      cursor: pointer;
      transition: background var(--transition), color var(--transition), border-color var(--transition);
      font-size: 0.8rem;
    }
    .btn-like { color: var(--accent); border-color: var(--accent); }
    .btn-bad  { color: #d36c6c; border-color: #d36c6c; }
    .btn-like:hover, .btn-bad:hover { background: #eee; }
    .btn-like.active { background: #0071e3; color: white; }
    .btn-bad.active  { background: #d36c6c; color: white; }
    
    .extra-link {
      color: var(--accent);
      text-decoration: none;
      font-size: 0.8rem;
      margin-left: 0.5rem;
    }
    .extra-link:hover {
      text-decoration: underline;
    }

    /* ポップアップスタイル */
    .popup-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.8);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      padding: 20px;
      box-sizing: border-box;
    }

    .popup-content {
      background: white;
      border-radius: 12px;
      padding: 1rem 2rem;
      width: 100%;
      max-width: 900px;
      height: auto;
      max-height: 90vh;
      text-align: center;
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .popup-close {
      position: absolute;
      top: 10px;
      right: 15px;
      background: none;
      border: none;
      font-size: 24px;
      cursor: pointer;
      color: #666;
    }

    .countdown-text {
      font-size: 2rem;
      color: var(--accent);
      margin: 1rem 0;
      font-weight: bold;
    }

    .ad-video {
      width: 800px;
      max-width: 90%;
      height: 0;
      padding-bottom: 50.625%; /* 16:9 aspect ratio */
      position: relative;
      margin: 0 auto;
      border: none;
      border-radius: 8px;
      overflow: hidden;
    }

    .ad-video iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
      border-radius: 8px;
    }
    
    /* モバイル対応 */
    @media (max-width: 768px) {
      .header-inner {
        flex-direction: column;
        text-align: center;
      }
      .header-title {
        flex-direction: column;
        gap: 0.5rem;
      }
      nav ul {
        flex-wrap: wrap;
        justify-content: center;
      }
      
      .page-container {
        padding: 1rem 0.5rem;
      }
      
      h1 {
        font-size: 1.6rem;
      }
      
      .filter-section {
        padding: 1rem;
      }
      
      .filter-row {
        gap: 0.5rem;
      }
      
      .filter-group {
        flex-direction: column;
        align-items: stretch;
        gap: 0.25rem;
      }
      
      .filter-group select {
        min-width: 100px;
      }
      
      .controls-section {
        flex-direction: column;
        align-items: stretch;
        gap: 1rem;
        padding: 1rem;
      }
      
      .controls-left, .controls-right {
        justify-content: center;
        gap: 0.5rem;
      }
      
      .table-card {
        min-width: 800px;
      }
      
      .table-card th, .table-card td {
        padding: 8px;
        font-size: 0.8rem;
      }
      
      .table-card td.comment-cell {
        width: 200px;
        min-width: 200px;
        max-width: 200px;
      }

      .popup-content {
        padding: 0.5rem 1rem;
        max-width: 95%;
        max-height: 90vh;
      }

      .ad-video {
        width: 100%;
        max-width: 95%;
        padding-bottom: 53.4375%; /* 16:9 aspect ratio for mobile */
      }

      .countdown-text {
        font-size: 1.5rem;
      }
    }
    
    @media (max-width: 480px) {
      .filter-buttons {
        flex-direction: column;
        width: 100%;
      }
      
      #btnClearFilters, #btnRefresh {
        width: 100%;
      }
      
      .controls-left {
        flex-direction: column;
        align-items: stretch;
      }
      
      .controls-right {
        justify-content: stretch;
      }
      
      .controls-right select {
        flex: 1;
      }
    }
    .free-mode-status {
      min-width: 120px;
      text-align: right;
      font-size: 0.92rem;
      font-weight: bold;
      padding: 0.25em 0.9em;
      border-radius: 6px;
      margin-left: 1.5em;
      margin-right: 0.2em;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      height: 2.1em;
      box-sizing: border-box;
    }
    .free-mode-status.free {
      background: #00d084;
      color: #fff;
    }
    .free-mode-status.ad {
      background: #e0e0e0;
      color: #444;
    }
  </style>

<script>
  function isInFreeMode() {
    const freeModeEnd = localStorage.getItem('freeModeEnd');
    if (!freeModeEnd) return false;
    return new Date().getTime() < parseInt(freeModeEnd);
  }

  function updateFreeModeStatus() {
    const status = document.getElementById('freeModeStatus');
    if (isInFreeMode()) {
      const freeModeEnd = parseInt(localStorage.getItem('freeModeEnd'));
      const remaining = freeModeEnd - new Date().getTime();
      if (remaining <= 0) {
        localStorage.removeItem('freeModeEnd');
        status.textContent = '問題アップロードで広告フリー';
        status.className = 'free-mode-status ad';
        return;
      }
      const hours = Math.floor(remaining / (60 * 60 * 1000));
      const minutes = Math.floor((remaining % (60 * 60 * 1000)) / (60 * 1000));
      const seconds = Math.floor((remaining % (60 * 1000)) / 1000);
      status.textContent = `フリーモード ${hours}時間${minutes}分${seconds}秒`;
      status.className = 'free-mode-status free';
    } else {
      status.textContent = '問題アップロードで広告フリー';
      status.className = 'free-mode-status ad';
    }
  }
  // --- フィルター用グローバル変数を追加 ---
  const filter = {
    grade: '',
    year: '',
    type: '',
    subject: '',
    stream: '',
    contentType: '',
    format: ''
  };

  // 広告ポップアップ表示（通常モード）
function showAdPopup(fileUrl) {
  const overlay = document.createElement('div');
  overlay.className = 'popup-overlay';
  overlay.innerHTML = `
    <div class="popup-content">
      <button class="popup-close">&times;</button>
      <h2>広告を視聴してファイルを開く</h2>
      <div class="countdown-text" id="countdownText">180</div>
      <p id="statusText">カウントダウン中…</p>
      <div class="ad-video">
        <iframe src="https://www.youtube.com/embed/FWlckcAayE4?autoplay=1&mute=0&controls=0&modestbranding=1&rel=0&iv_load_policy=3"
                frameborder="0" allow="autoplay; encrypted-media"></iframe>
      </div>
    </div>`;
  document.body.appendChild(overlay);

  let countdown = 10;
  const countdownEl = overlay.querySelector('#countdownText');
  const statusEl    = overlay.querySelector('#statusText');
  const timer = setInterval(() => {
    countdown--;
    countdownEl.textContent = countdown;
    if (countdown <= 0) {
      clearInterval(timer);
      statusEl.textContent = '';  // ステータスは消す

      // ↓ダウンロードボタン風にデザインを変更↓
      countdownEl.textContent = 'ファイル表示';
      countdownEl.style.cursor = 'pointer';
      // 背景薄い青
      countdownEl.style.backgroundColor = '#e0f5ff';
      // 枠は濃い青
      countdownEl.style.border = '1px solid #0071e3';
      // 文字色は濃い青
      countdownEl.style.color = '#005bb5';
      // 少し丸角
      countdownEl.style.borderRadius = '6px';
      countdownEl.style.padding = '0.4rem 0.8rem';

      countdownEl.onclick = () => {
        window.open(fileUrl, '_blank', 'noopener,noreferrer');
        document.body.removeChild(overlay);
      };
    }
  }, 1000);


  overlay.querySelector('.popup-close').onclick = () => {
    clearInterval(timer);
    document.body.removeChild(overlay);
  };
  overlay.onclick = e => {
    if (e.target === overlay) {
      clearInterval(timer);
      document.body.removeChild(overlay);
    }
  };
}
  // 動画読み込み完了時の処理
  function videoLoaded() {
    setTimeout(() => {
      const statusElement = document.getElementById('statusText');
      if (statusElement) {
        statusElement.textContent = '動画再生中... カウントダウン後にファイルが開きます';
      }
    }, 2000);
  }

  // 「見る」リンクの処理
  function attachHandlers() {
    document.querySelectorAll('.view-link').forEach(link => {
      link.onclick = e => {
        e.preventDefault();
        const fileUrl = link.dataset.url;
        if (isInFreeMode()) {
          // フリーモードなら直接開く
          window.open(fileUrl, '_blank', 'noopener,noreferrer');
        } else {
          // 通常モードはポップアップ
          showAdPopup(fileUrl);
        }
      };
    });

    document.querySelectorAll('.btn-like').forEach(btn => {
      btn.onclick = () => {
        const id = btn.dataset.id, prev = localStorage.getItem('vote_' + id), tr = btn.closest('tr');
        const badBtn = tr.querySelector('.btn-bad');
        let count = parseInt(btn.textContent.replace(/\D/g,''),10);
        if (prev==='good') {
          btn.classList.remove('active'); localStorage.removeItem('vote_' + id); google.script.run.unlike(Number(id));
          btn.textContent = `❤ ${--count}`;
        } else {
          if (prev==='bad') {
            let bc = parseInt(badBtn.textContent.replace(/\D/g,''),10);
            badBtn.classList.remove('active'); localStorage.removeItem('vote_' + id); google.script.run.unbad(Number(id));
            badBtn.textContent = `👎 ${--bc}`;
          }
          btn.classList.add('active'); localStorage.setItem('vote_' + id, 'good'); google.script.run.like(Number(id));
          btn.textContent = `❤ ${++count}`;
        }
      };
    });
    document.querySelectorAll('.btn-bad').forEach(btn => {
      btn.onclick = () => {
        const id = btn.dataset.id, prev = localStorage.getItem('vote_' + id), tr = btn.closest('tr');
        const likeBtn = tr.querySelector('.btn-like');
        let count = parseInt(btn.textContent.replace(/\D/g,''),10);
        if (prev==='bad') {
          btn.classList.remove('active'); localStorage.removeItem('vote_' + id); google.script.run.unbad(Number(id));
          btn.textContent = `👎 ${--count}`;
        } else {
          if (prev==='good') {
            let lc = parseInt(likeBtn.textContent.replace(/\D/g,''),10);
            likeBtn.classList.remove('active'); localStorage.removeItem('vote_' + id); google.script.run.unlike(Number(id));
            likeBtn.textContent = `❤ ${--lc}`;
          }
          btn.classList.add('active'); localStorage.setItem('vote_' + id, 'bad'); google.script.run.bad(Number(id));
          btn.textContent = `👎 ${++count}`;
        }
      };
    });
  }

  // 相対時間表示関数
  function formatRelativeTime(dateStr) {
    try {
      const date = new Date(dateStr);
      const now = new Date();
      const diffMs = now.getTime() - date.getTime();
      const diffSec = Math.floor(diffMs / 1000);
      const diffMin = Math.floor(diffSec / 60);
      const diffHour = Math.floor(diffMin / 60);
      const diffDay = Math.floor(diffHour / 24);

      if (diffDay >= 1) {
        return `${diffDay}日前`;
      } else if (diffHour >= 1) {
        return `${diffHour}時間前`;
      } else if (diffMin >= 1) {
        return `${diffMin}分前`;
      } else {
        return `${diffSec}秒前`;
      }
    } catch (error) {
      return dateStr;
    }
  }

  // データ取得
  function fetchData() {
    const tbody = document.getElementById('resultBody');
    tbody.innerHTML = '<tr id="loadingRow"><td colspan="11" style="text-align:center;color:#666">読み込み中…（表は横スクロール対応）</td></tr>';
    google.script.run
      .withSuccessHandler(buildRows)
      .withFailureHandler(function(error) {
        console.error('データ取得エラー:', error);
        tbody.innerHTML = '<tr><td colspan="11" style="text-align:center;color:red;">データの取得に失敗しました: ' + error.message + '</td></tr>';
      })
      .getData();
  }

  // 結果描画
  function buildRows(data) {
    const tbody = document.getElementById('resultBody');
    tbody.innerHTML = '';
    if (!data || data.length === 0) {
      tbody.innerHTML = '<tr><td colspan="11" style="text-align:center;color:#666">データがありません</td></tr>';
      return;
    }
    data.forEach(item => {
      const vt = localStorage.getItem('vote_' + item.id);
      const tr = document.createElement('tr');
      ['grade','year','type','subject','stream','contentType','format'].forEach(k => {
        tr.dataset[k] = String(item[k] || '');
      });
      tr.dataset.date = String(item.date || '');
      const safe = String(item.comment || '').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      const rel = formatRelativeTime(item.date);
      tr.innerHTML = `
        <td>${String(item.grade || '')}</td>
        <td>${String(item.year || '')}</td>
        <td>${String(item.type || '')}</td>
        <td>${String(item.subject || '')}</td>
        <td>${String(item.stream || '')}</td>
        <td>${String(item.contentType || '')}</td>
        <td class="format-cell">${String(item.format || '')}</td>
        <td><a href="#" class="view-link" data-url="${String(item.url || '')}">見る</a></td>
        <td class="comment-cell" data-comment="${safe}"><div class="comment-text">${safe}</div></td>
        <td class="col-date date-cell">${rel}</td>
        <td class="col-eval eval-cell">
          <button class="btn-like${vt==='good'?' active':''}" data-id="${item.id}">❤ ${item.likes || 0}</button>
          <button class="btn-bad${vt==='bad'?' active':''}" data-id="${item.id}">👎 ${item.bad || 0}</button>
        </td>`;
      tbody.appendChild(tr);
    });
    attachHandlers();
    applyFilters();
    applySort();
    applyColumns();
  }

  // フィルタ適用
  function applyFilters() {
    document.querySelectorAll('#resultBody tr').forEach(tr => {
      if (!tr.dataset) return;
      const ok = ['grade','year','type','subject','stream','contentType','format']
        .every(k => !filter[k] || tr.dataset[k] === filter[k]);
      tr.style.display = ok ? '' : 'none';
    });
  }

  // ソート適用
  function applySort() {
    const mode = document.getElementById('sortMenu').value;
    const tb = document.getElementById('resultBody');
    const rows = Array.from(tb.children).filter(r => r.style.display!=='none' && r.dataset.date);

    rows.sort((a,b) => {
      if (mode === 'upload_desc') {
        return new Date(b.dataset.date) - new Date(a.dataset.date);
      }
      if (mode === 'upload_asc') {
        return new Date(a.dataset.date) - new Date(b.dataset.date);
      }
      if (mode === 'year_desc') {
        return parseInt(b.children[1].textContent) - parseInt(a.children[1].textContent);
      }
      if (mode === 'year_asc') {
        return parseInt(a.children[1].textContent) - parseInt(b.children[1].textContent);
      }
      return 0;
    });
    rows.forEach(r => tb.appendChild(r));
  }

  // カラム表示制御
  function applyColumns() {
    document.querySelectorAll('.col-date').forEach(c => c.classList.toggle('hidden-col', !document.getElementById('toggleDate').checked));
    document.querySelectorAll('.format-cell').forEach(c => c.classList.toggle('hidden-col', !document.getElementById('toggleFormatCol').checked));
    document.querySelectorAll('th.col-format').forEach(th => th.classList.toggle('hidden-col', !document.getElementById('toggleFormatCol').checked));
    document.querySelectorAll('.col-eval').forEach(c => c.classList.toggle('hidden-col', !document.getElementById('toggleEval').checked));

    const mode = document.getElementById('commentMode').value;
    document.querySelectorAll('th.col-comment, td.comment-cell').forEach(el => el.classList.toggle('hidden-col', mode==='none'));
    document.querySelectorAll('.comment-cell .comment-text').forEach(box => {
      const td = box.parentElement;
      td.querySelectorAll('a.extra-link').forEach(a => a.remove());
      box.style.overflow = 'hidden';
      box.style.display = '-webkit-box';
      box.style.webkitBoxOrient = 'vertical';
      if (mode === 'compact') {
        box.style.webkitLineClamp = '1';
        box.style.maxHeight = '1.4em';
      } else if (mode === 'lines3') {
        box.style.webkitLineClamp = '3';
        box.style.maxHeight = 'calc(3 * 1.4em)';
      } else if (mode === 'none') {
        return;
      } else {
        box.style.webkitLineClamp = 'none';
        box.style.maxHeight = 'none';
        box.style.overflow = 'visible';
        box.style.display = 'block';
      }
      const raw = td.dataset.comment || '';
      const lines = raw.split('\n').length;
      const chars = raw.length;
      const shouldTruncate = (mode==='lines3' && lines>3) || (mode==='compact' && (lines>1||chars>100));
      if (shouldTruncate && raw.trim()) {
        const more = document.createElement('a');
        more.href = '#'; more.textContent = '...もっと読む'; more.className = 'extra-link';
        more.onclick = e => {
          e.preventDefault();
          box.style.webkitLineClamp = 'none';
          box.style.maxHeight = 'none';
          box.style.overflow = 'visible';
          box.style.display = 'block';
          more.remove();
          const less = document.createElement('a');
          less.href = '#'; less.textContent = '折りたたむ'; less.className = 'extra-link';
          less.onclick = ev => { ev.preventDefault(); applyColumns(); };
          td.appendChild(less);
        };
        td.appendChild(more);
      }
    });
  }

  document.addEventListener('DOMContentLoaded', () => {
    updateFreeModeStatus();
    setInterval(updateFreeModeStatus, 1000);
    ['grade','year','type','subject','stream','contentType'].forEach(id => {
      document.getElementById(id).onchange = e => { filter[id] = e.target.value; applyFilters(); };
    });
    document.getElementById('formatSelect').onchange = e => { filter.format = e.target.value; applyFilters(); };
    document.getElementById('btnClearFilters').onclick = () => {
      ['grade','year','type','subject','stream','contentType','format'].forEach(k => {
        const el = k==='format' ? document.getElementById('formatSelect') : document.getElementById(k);
        el.value = ''; filter[k] = '';
      });
      applyFilters();
    };
    document.getElementById('btnRefresh').onclick = fetchData;
    document.getElementById('toggleDate').onchange = applyColumns;
    document.getElementById('toggleFormatCol').onchange = applyColumns;
    document.getElementById('toggleEval').onchange = applyColumns;
    document.getElementById('commentMode').onchange = applyColumns;
    document.getElementById('sortMenu').onchange = applySort;
    applyColumns();
    fetchData();

    // 横スクロール誘導アニメーションを数秒だけ表示（オーバーレイ）
    const overlay = document.getElementById('scroll-hint-overlay');
    const hint = document.getElementById('scroll-hint');
    const arrow = document.getElementById('scroll-arrow');
    let dir = 1, count = 0;
    const anim = setInterval(() => {
      arrow.style.transform = `translateX(${dir*32}px)`;
      dir *= -1;
      count++;
      if(count > 5) { // 3往復で消す
        clearInterval(anim);
        overlay.style.opacity = 0;
        setTimeout(()=>{ overlay.style.display = 'none'; }, 600);
      }
    }, 400);
  });
</script>
