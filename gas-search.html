<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>問題検索 - 考査村</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            padding: 30px;
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }
        
        .search-form {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        
        .form-group {
            display: flex;
            flex-direction: column;
        }
        
        .form-group label {
            font-weight: bold;
            margin-bottom: 5px;
            color: #333;
        }
        
        .form-group select,
        .form-group input {
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }
        
        .search-btn {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .search-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        .results {
            margin-top: 30px;
        }
        
        .result-item {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 15px;
            border-left: 4px solid #667eea;
        }
        
        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        
        .result-title {
            font-weight: bold;
            font-size: 18px;
            color: #333;
        }
        
        .result-meta {
            color: #666;
            font-size: 14px;
        }
        
        .result-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        
        .action-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
        }
        
        .like-btn {
            background: #28a745;
            color: white;
        }
        
        .bad-btn {
            background: #dc3545;
            color: white;
        }
        
        .view-btn {
            background: #007bff;
            color: white;
        }
        
        .action-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 3px 10px rgba(0,0,0,0.2);
        }
        
        .no-results {
            text-align: center;
            color: #666;
            font-style: italic;
            padding: 40px;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
        }
        
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        @media (max-width: 768px) {
            .container {
                margin: 10px;
                padding: 20px;
            }
            
            .search-form {
                grid-template-columns: 1fr;
            }
            
            .result-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>問題検索</h1>
        
        <form class="search-form" id="searchForm">
            <div class="form-group">
                <label for="grade">学年</label>
                <select id="grade" name="grade">
                    <option value="">すべて</option>
                    <option value="1年">1年</option>
                    <option value="2年">2年</option>
                    <option value="3年">3年</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="year">年度</label>
                <select id="year" name="year">
                    <option value="">すべて</option>
                    <option value="2024">2024年度</option>
                    <option value="2023">2023年度</option>
                    <option value="2022">2022年度</option>
                    <option value="2021">2021年度</option>
                    <option value="2020">2020年度</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="subject">科目</label>
                <select id="subject" name="subject">
                    <option value="">すべて</option>
                    <option value="国語">国語</option>
                    <option value="数学">数学</option>
                    <option value="英語">英語</option>
                    <option value="理科">理科</option>
                    <option value="社会">社会</option>
                    <option value="その他">その他</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="type">種類</label>
                <select id="type" name="type">
                    <option value="">すべて</option>
                    <option value="中間考査">中間考査</option>
                    <option value="期末考査">期末考査</option>
                    <option value="実力考査">実力考査</option>
                    <option value="模擬考査">模擬考査</option>
                    <option value="その他">その他</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="contentType">内容</label>
                <select id="contentType" name="contentType">
                    <option value="">すべて</option>
                    <option value="問題">問題</option>
                    <option value="解説">解説</option>
                    <option value="解答">解答</option>
                    <option value="問題＆解説">問題＆解説</option>
                    <option value="その他">その他</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>&nbsp;</label>
                <button type="submit" class="search-btn">検索</button>
            </div>
        </form>
        
        <div class="loading" id="loading" style="display: none;">
            <div class="spinner"></div>
            <p>検索中...</p>
        </div>
        
        <div class="results" id="results">
            <div class="no-results">検索条件を選択して「検索」ボタンを押してください</div>
        </div>
    </div>

    <script src="js/gas-api.js"></script>
    <script src="js/api.js"></script>
    <script>
        // GASのURLを設定
        const GAS_URL = 'https://script.google.com/macros/s/1m8CK9hflCdy-Ll805tQRC_1N5AsoFp9disC9B0F8hzeDifdTSEGoBzQj/exec';
        
        // APIクライアントをGAS用に設定
        if (window.kosamuraAPI) {
            window.kosamuraAPI.baseURL = GAS_URL;
        }

        document.addEventListener('DOMContentLoaded', function() {
            const searchForm = document.getElementById('searchForm');
            const results = document.getElementById('results');
            const loading = document.getElementById('loading');

            // 検索フォームの送信
            searchForm.addEventListener('submit', async function(e) {
                e.preventDefault();
                
                showLoading(true);
                
                try {
                    // 全データを取得
                    const data = await google.script.run.getData();
                    
                    // フィルタリング
                    const filteredData = filterData(data);
                    
                    // 結果を表示
                    displayResults(filteredData);
                    
                } catch (error) {
                    console.error('Search error:', error);
                    results.innerHTML = '<div class="no-results">検索中にエラーが発生しました</div>';
                } finally {
                    showLoading(false);
                }
            });

            // データフィルタリング
            function filterData(data) {
                const formData = new FormData(searchForm);
                const grade = formData.get('grade');
                const year = formData.get('year');
                const subject = formData.get('subject');
                const type = formData.get('type');
                const contentType = formData.get('contentType');

                return data.filter(item => {
                    if (grade && item.grade !== grade) return false;
                    if (year && item.year !== year) return false;
                    if (subject && item.subject !== subject) return false;
                    if (type && item.type !== type) return false;
                    if (contentType && item.contentType !== contentType) return false;
                    return true;
                });
            }

            // 結果表示
            function displayResults(data) {
                if (data.length === 0) {
                    results.innerHTML = '<div class="no-results">該当する問題が見つかりませんでした</div>';
                    return;
                }

                const html = data.map(item => `
                    <div class="result-item">
                        <div class="result-header">
                            <div class="result-title">${item.grade} ${item.year} ${item.type} ${item.subject} ${item.contentType}</div>
                            <div class="result-meta">
                                ${item.date} | いいね: ${item.likes} | バッド: ${item.bad}
                            </div>
                        </div>
                        <div class="result-meta">
                            文理区分: ${item.stream} | ファイル形式: ${item.format}
                            ${item.comment ? `<br>コメント: ${item.comment}` : ''}
                        </div>
                        <div class="result-actions">
                            <button class="action-btn like-btn" onclick="likePost(${item.id})">
                                👍 いいね (${item.likes})
                            </button>
                            <button class="action-btn bad-btn" onclick="badPost(${item.id})">
                                👎 バッド (${item.bad})
                            </button>
                            <a href="${item.url}" target="_blank" class="action-btn view-btn">
                                📄 ファイルを見る
                            </a>
                        </div>
                    </div>
                `).join('');

                results.innerHTML = html;
            }

            function showLoading(show) {
                if (show) {
                    loading.style.display = 'block';
                    results.style.display = 'none';
                } else {
                    loading.style.display = 'none';
                    results.style.display = 'block';
                }
            }
        });

        // いいね機能
        async function likePost(id) {
            try {
                const result = await google.script.run.like(id);
                // ページを再読み込みして結果を更新
                location.reload();
            } catch (error) {
                console.error('Like error:', error);
                alert('いいねの処理に失敗しました');
            }
        }

        // バッド機能
        async function badPost(id) {
            try {
                const result = await google.script.run.bad(id);
                // ページを再読み込みして結果を更新
                location.reload();
            } catch (error) {
                console.error('Bad error:', error);
                alert('バッドの処理に失敗しました');
            }
        }
    </script>
</body>
</html>
