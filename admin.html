<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>管理者ページ - 秋高考査村</title>
  <meta name="viewport" content="width=1200" />
  <style>
    html { overflow-y: scroll; }
    :root {
      --bg-page: linear-gradient(135deg, #f0f0f5 0%, #e8e8ee 100%);
      --bg-card: #ffffff;
      --accent: #0071e3;
      --accent-hover: #005bb5;
      --radius: 12px;
      --transition: 0.3s cubic-bezier(.4,0,.2,1);
      font-size: 18px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg-page);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #1d1d20;
      padding-top: 64px;
      padding-left: 32px;
      padding-right: 32px;
    }
    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      background: var(--bg-card);
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      z-index: 1000;
    }
    .header-inner {
      max-width: 1200px; margin: 0 auto;
      padding: 16px 24px;
      display: flex; align-items: center;
      justify-content: space-between;
      flex-wrap: wrap; gap: 16px;
    }
    .header-title {
      display: flex;
      gap: 19px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-start;
    }
    .site-title {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: #0071e3;
      display: inline-block;
    }
    .site-subtitle { font-size: 0.9rem; color: #6e6e73; }
    nav { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; }
    nav ul { display: flex; justify-content: center; list-style: none; white-space: nowrap; }
    nav a {
      display: block; padding: 8px 16px;
      color: #1d1d20; text-decoration: none;
      border-bottom: 1px solid #ccc;
      transition: background 0.2s;
      font-size: 15px;
    }
    nav a:hover { background: #e8ecf2; }
    nav a.active {
      background: #d0e4fd;
      border-bottom: 3px solid var(--accent);
    }
    main {
      max-width: 1400px;
      margin: 96px auto 32px;
      padding-left: 32px;
      padding-right: 32px;
      box-sizing: border-box;
    }
    h1 {
      text-align: center;
      font-size: 2rem;
      margin-bottom: 1rem;
      background: linear-gradient(90deg, var(--accent), #5ac8fa);
      -webkit-background-clip: text;
      color: transparent;
    }
    .subtitle {
      text-align: center; font-size: 19px;
      margin-bottom: 32px; color: #6e6e73;
    }
    .card {
      background: var(--bg-card);
      border-radius: 12px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.1);
      max-width: 800px;
      width: 100%;
      margin: 0 auto 10px auto;
      padding: 24px 40px 10px 40px;
      transition: box-shadow var(--transition);
      box-sizing: border-box;
      word-break: break-word;
      overflow: hidden;
    }
    .card:hover {
      box-shadow: 0 8px 32px rgba(0,0,0,0.15);
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: #1d1d20;
    }
    input[type="password"], input[type="text"] {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e1e1e1;
      border-radius: 8px;
      font-size: 16px;
      transition: border-color 0.3s;
      box-sizing: border-box;
    }
    input[type="password"]:focus, input[type="text"]:focus {
      outline: none;
      border-color: var(--accent);
    }
    .btn {
      background: var(--accent);
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.3s;
      text-decoration: none;
      display: inline-block;
      text-align: center;
    }
    .btn:hover {
      background: var(--accent-hover);
    }
    .btn-danger {
      background: #dc3545;
    }
    .btn-danger:hover {
      background: #c82333;
    }
    .btn-secondary {
      background: #6c757d;
    }
    .btn-secondary:hover {
      background: #5a6268;
    }
    .admin-section {
      margin-bottom: 40px;
    }
    .post-item {
      border: 1px solid #e1e1e1;
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 16px;
      background: #f8f9fa;
    }
    .post-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .post-title {
      font-weight: 600;
      color: var(--accent);
    }
    .post-meta {
      font-size: 14px;
      color: #6c757d;
    }
    .post-actions {
      display: flex;
      gap: 8px;
    }
    .checkbox-group {
      display: flex;
      gap: 16px;
      margin-bottom: 16px;
    }
    .checkbox-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .checkbox-item input[type="checkbox"] {
      width: auto;
    }
    .bulk-actions {
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid #e1e1e1;
    }
    .loading {
      text-align: center;
      padding: 20px;
      color: #6c757d;
    }
    .error {
      color: #dc3545;
      background: #f8d7da;
      border: 1px solid #f5c6cb;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 16px;
    }
    .success {
      color: #155724;
      background: #d4edda;
      border: 1px solid #c3e6cb;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 16px;
    }
  </style>
</head>
<body>
  <header>
    <div class="header-inner">
      <div class="header-title">
        <a href="gas-index.html" class="site-title">考査村</a>
        <span class="site-subtitle">秋高生のための過去問共有サイト</span>
      </div>
      <nav>
        <ul>
          <li><a href="gas-index.html">ホーム</a></li>
          <li><a href="gas-upload.html">アップロード</a></li>
          <li><a href="gas-search.html">検索</a></li>
          <li><a href="gas-share.html">共有</a></li>
          <li><a href="gas-admin.html" class="active">管理者</a></li>
        </ul>
  </nav>
  </div>
  </header>

  <main>
    <h1>管理者ページ</h1>
    <p class="subtitle">投稿の管理と削除</p>

    <div class="card">
      <div class="admin-section">
        <h2>認証</h2>
        <div class="form-group">
          <label for="adminPassword">管理者パスワード:</label>
          <input type="password" id="adminPassword" placeholder="パスワードを入力">
    </div>
        <button class="btn" onclick="authenticate()">認証</button>
  </div>

      <div id="adminContent" style="display: none;">
        <div class="admin-section">
          <h2>投稿一覧</h2>
          <div id="postsList">
            <div class="loading">読み込み中...</div>
        </div>
        </div>
        
        <div class="admin-section">
          <h2>一括操作</h2>
          <div class="checkbox-group">
            <label class="checkbox-item">
              <input type="checkbox" id="selectAll" onchange="toggleSelectAll()">
              すべて選択
            </label>
          </div>
          <div class="bulk-actions">
            <button class="btn btn-danger" onclick="deleteSelected()">選択した投稿を削除</button>
          </div>
        </div>
    </div>
  </div>
  </main>

  <script src="js/api.js"></script>
  <script>
    const GAS_URL = 'https://script.google.com/macros/s/1m8CK9hflCdy-Ll805tQRC_1N5AsoFp9disC9B0F8hzeDifdTSEGoBzQj/exec';
    
    // GAS URLを設定
    if (window.kosamuraAPI) {
      window.kosamuraAPI.baseURL = GAS_URL;
    }

    let posts = [];
    let isAuthenticated = false;

    async function authenticate() {
      const password = document.getElementById('adminPassword').value;
      if (!password) {
        alert('パスワードを入力してください');
        return;
      }

      try {
        const result = await window.kosamuraAPI.checkAdminPassword(password);
        if (result) {
          isAuthenticated = true;
          document.getElementById('adminContent').style.display = 'block';
          loadPosts();
        } else {
          alert('パスワードが正しくありません');
        }
      } catch (error) {
        console.error('認証エラー:', error);
        alert('認証に失敗しました');
      }
    }

    async function loadPosts() {
      try {
        posts = await window.kosamuraAPI.getData();
        displayPosts();
      } catch (error) {
        console.error('投稿読み込みエラー:', error);
        document.getElementById('postsList').innerHTML = '<div class="error">投稿の読み込みに失敗しました</div>';
      }
    }

    function displayPosts() {
      const postsList = document.getElementById('postsList');
      if (posts.length === 0) {
        postsList.innerHTML = '<div class="loading">投稿がありません</div>';
          return;
      }

      const postsHTML = posts.map((post, index) => `
        <div class="post-item">
          <div class="post-header">
            <div>
              <div class="post-title">${post.filename || '無題'}</div>
              <div class="post-meta">
                ${post.grade}年 ${post.subject} - ${post.type} (${post.year}年)
                <br>いいね: ${post.likes || 0} | バッド: ${post.bad || 0}
              </div>
            </div>
            <div class="post-actions">
              <label class="checkbox-item">
                <input type="checkbox" class="post-checkbox" value="${index}">
                選択
              </label>
              <button class="btn btn-danger" onclick="deletePost(${index})">削除</button>
            </div>
          </div>
        </div>
      `).join('');

      postsList.innerHTML = postsHTML;
    }

    function toggleSelectAll() {
      const selectAll = document.getElementById('selectAll');
      const checkboxes = document.querySelectorAll('.post-checkbox');
      checkboxes.forEach(checkbox => {
        checkbox.checked = selectAll.checked;
      });
    }

    async function deletePost(index) {
      if (!confirm('この投稿を削除しますか？')) return;

      try {
        await window.kosamuraAPI.deletePost(posts[index].id);
        posts.splice(index, 1);
        displayPosts();
        alert('投稿を削除しました');
      } catch (error) {
        console.error('削除エラー:', error);
        alert('削除に失敗しました');
      }
    }

    async function deleteSelected() {
      const selectedCheckboxes = document.querySelectorAll('.post-checkbox:checked');
      if (selectedCheckboxes.length === 0) {
        alert('削除する投稿を選択してください');
        return;
      }

      if (!confirm(`${selectedCheckboxes.length}件の投稿を削除しますか？`)) return;

      try {
        const selectedIndices = Array.from(selectedCheckboxes).map(cb => parseInt(cb.value));
        const selectedIds = selectedIndices.map(index => posts[index].id);
        
        await window.kosamuraAPI.deletePostsBulk(selectedIds);
        
        // 削除された投稿を配列から除去
        selectedIndices.sort((a, b) => b - a).forEach(index => {
          posts.splice(index, 1);
        });
        
        displayPosts();
        document.getElementById('selectAll').checked = false;
        alert('選択した投稿を削除しました');
      } catch (error) {
        console.error('一括削除エラー:', error);
        alert('一括削除に失敗しました');
      }
    }
  </script>
</body>
</html>
