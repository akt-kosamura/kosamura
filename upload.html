<!DOCTYPE html>

<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>秋高考査村 - アップロード</title>
  <link rel="stylesheet" href="css/upload.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
</head>
<body>
  <header>
    <div class="header-inner">
      <div class="header-title">
        <div class="site-title">秋高考査村</div>
        <div class="site-subtitle">秋田県立秋田高等学校</div>
      </div>
      <div class="free-mode-status free">
        <i class="fas fa-star"></i>
        フリーモード
      </div>
    </div>
    <nav>
      <ul>
        <li><a href="index.html">ホーム</a></li>
        <li><a href="upload.html" class="active">アップロード</a></li>
        <li><a href="search.html">問題データベース</a></li>
        <li><a href="share.html">共有・拡散</a></li>
        <li><a href="https://c.kuku.lu/hmc853pz" target="_blank">掲示板</a></li>
        <li><a href="https://forms.gle/ZWtQCvecH4eZtTEU7" target="_blank">報告・問い合わせ</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <h1>アップロード</h1>
    <p class="subtitle">問題・解答をアップロードして共有しましょう</p>

    <div class="card">
      <div class="card-title">
        <span class="step-label">Step 1: ファイル選択</span>
      </div>
      <div class="card-content">
        <div class="file-input-wrapper" id="fileInputWrapper">
          <input type="file" id="fileInput" multiple accept="image/*,.pdf" style="display: none;" />
          <button type="button" class="custom-file-btn" id="customFileBtn">
            <svg class="file-svg" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M12 2V8M12 8L15 5M12 8L9 5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M20 12V18C20 19.1046 19.1046 20 18 20H6C4.89543 20 4 19.1046 4 18V12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span class="file-btn-label">ファイルを選択またはドラッグ&ドロップ</span>
          </button>
        </div>
        <ul id="fileList"></ul>
        <button type="button" class="continue-btn" id="continueBtn" style="display: none;">次へ進む</button>
      </div>
    </div>

    <div class="card" id="step2Card" style="display: none;">
      <div class="card-title">
        <span class="step-label">Step 2: 情報入力</span>
        <button type="button" class="back-btn" id="backBtn">← 戻る</button>
      </div>
      <div class="card-content">
        <table class="form-table">
          <tr>
            <td>学年</td>
            <td>
              <select id="grade" required>
                <option value="">選択してください</option>
                <option value="1年">1年</option>
                <option value="2年">2年</option>
                <option value="3年">3年</option>
              </select>
            </td>
          </tr>
          <tr>
            <td>年度</td>
            <td>
              <select id="year" required>
                <option value="">選択してください</option>
                <option value="2024">2024年度</option>
                <option value="2023">2023年度</option>
                <option value="2022">2022年度</option>
                <option value="2021">2021年度</option>
                <option value="2020">2020年度</option>
              </select>
            </td>
          </tr>
          <tr>
            <td>種類</td>
            <td>
              <div class="radios">
                <label><input type="radio" name="type" value="中間考査" required> 中間考査</label>
                <label><input type="radio" name="type" value="期末考査"> 期末考査</label>
                <label><input type="radio" name="type" value="実力考査"> 実力考査</label>
                <label><input type="radio" name="type" value="その他"> その他</label>
              </div>
            </td>
          </tr>
          <tr>
            <td>科目</td>
            <td>
              <select id="subject" required>
                <option value="">選択してください</option>
                <option value="国語">国語</option>
                <option value="数学">数学</option>
                <option value="英語">英語</option>
                <option value="理科">理科</option>
                <option value="社会">社会</option>
                <option value="その他">その他</option>
              </select>
            </td>
          </tr>
          <tr>
            <td>ストリーム</td>
            <td>
              <div class="radios">
                <label><input type="radio" name="stream" value="特進" required> 特進</label>
                <label><input type="radio" name="stream" value="普通"> 普通</label>
                <label><input type="radio" name="stream" value="その他"> その他</label>
              </div>
            </td>
          </tr>
          <tr>
            <td>コメント</td>
            <td>
              <textarea id="comment" placeholder="問題の特徴や注意点などを記入してください（任意）"></textarea>
            </td>
          </tr>
        </table>
        <button type="button" class="upload-btn" id="uploadBtn">アップロード</button>
        <div id="successMsg" class="success-msg" style="display: none;"></div>
      </div>
    </div>
  </main>

  <!-- プレビューモーダル -->
  <div class="preview-modal" id="previewModal">
    <div class="preview-content">
      <button class="preview-close" id="previewClose">&times;</button>
      <img id="previewImage" src="" alt="プレビュー" />
    </div>
  </div>

  <script src="js/api.js"></script>
  <script>
    let selectedFiles = [];
    let currentStep = 1;

    // ファイル選択処理
    const fileInput = document.getElementById('fileInput');
    const customFileBtn = document.getElementById('customFileBtn');
    const fileInputWrapper = document.getElementById('fileInputWrapper');
    const fileList = document.getElementById('fileList');
    const continueBtn = document.getElementById('continueBtn');
    const step2Card = document.getElementById('step2Card');
    const backBtn = document.getElementById('backBtn');
    const uploadBtn = document.getElementById('uploadBtn');
    const successMsg = document.getElementById('successMsg');

    // ファイル選択ボタンクリック
    customFileBtn.addEventListener('click', () => {
      fileInput.click();
    });

    // ファイル選択処理
    fileInput.addEventListener('change', handleFileSelect);

    // ドラッグ&ドロップ処理
    fileInputWrapper.addEventListener('dragover', (e) => {
      e.preventDefault();
      fileInputWrapper.classList.add('dragover');
    });

    fileInputWrapper.addEventListener('dragleave', () => {
      fileInputWrapper.classList.remove('dragover');
    });

    fileInputWrapper.addEventListener('drop', (e) => {
      e.preventDefault();
      fileInputWrapper.classList.remove('dragover');
      const files = Array.from(e.dataTransfer.files);
      handleFiles(files);
    });

    // ファイル処理
    function handleFileSelect(e) {
      const files = Array.from(e.target.files);
      handleFiles(files);
    }

    function handleFiles(files) {
      const validFiles = files.filter(file => {
        const isValidType = file.type.startsWith('image/') || file.type === 'application/pdf';
        if (!isValidType) {
          alert(`${file.name} は対応していないファイル形式です。画像またはPDFファイルを選択してください。`);
        }
        return isValidType;
      });

      selectedFiles = selectedFiles.concat(validFiles);
      updateFileList();
      updateContinueButton();
    }

    // ファイルリスト更新
    function updateFileList() {
      fileList.innerHTML = '';
      
      selectedFiles.forEach((file, index) => {
        const li = document.createElement('li');
        li.className = 'file-item';
        li.setAttribute('data-index', index);
        
        const handle = document.createElement('span');
        handle.className = 'handle';
        handle.innerHTML = '⋮⋮';
        
        const fileNumber = document.createElement('div');
        fileNumber.className = 'file-number';
        fileNumber.textContent = index + 1;
        
        const fileIcon = document.createElement('div');
        fileIcon.className = 'file-icon';
        
        if (file.type.startsWith('image/')) {
          const img = document.createElement('img');
          img.src = URL.createObjectURL(file);
          img.alt = file.name;
          img.addEventListener('click', () => showPreview(img.src));
          fileIcon.appendChild(img);
        } else {
          fileIcon.innerHTML = '<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M14 2H6C4.89543 2 4 2.89543 4 4V20C4 21.1046 4.89543 22 6 22H18C19.1046 22 20 21.1046 20 20V8L14 2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M14 2V8H20" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>';
        }
        
        const fileName = document.createElement('div');
        fileName.className = 'file-name';
        fileName.textContent = file.name;
        
        const removeBtn = document.createElement('button');
        removeBtn.className = 'remove-btn';
        removeBtn.innerHTML = '×';
        removeBtn.addEventListener('click', () => removeFile(index));
        
        li.appendChild(handle);
        li.appendChild(fileNumber);
        li.appendChild(fileIcon);
        li.appendChild(fileName);
        li.appendChild(removeBtn);
        fileList.appendChild(li);
      });
      
      // Sortable.jsでドラッグ&ドロップ並び替え
      if (selectedFiles.length > 1) {
        new Sortable(fileList, {
          handle: '.handle',
          animation: 150,
          onEnd: function(evt) {
            const oldIndex = evt.oldIndex;
            const newIndex = evt.newIndex;
            const file = selectedFiles.splice(oldIndex, 1)[0];
            selectedFiles.splice(newIndex, 0, file);
            updateFileList();
          }
        });
      }
    }

    // ファイル削除
    function removeFile(index) {
      selectedFiles.splice(index, 1);
      updateFileList();
      updateContinueButton();
    }

    // 次へ進むボタン更新
    function updateContinueButton() {
      if (selectedFiles.length > 0) {
        continueBtn.style.display = 'block';
      } else {
        continueBtn.style.display = 'none';
      }
    }

    // 次へ進む
    continueBtn.addEventListener('click', () => {
      currentStep = 2;
      document.querySelector('.card').style.display = 'none';
      step2Card.style.display = 'block';
    });

    // 戻る
    backBtn.addEventListener('click', () => {
      currentStep = 1;
      step2Card.style.display = 'none';
      document.querySelector('.card').style.display = 'block';
    });

    // プレビュー表示
    function showPreview(src) {
      const modal = document.getElementById('previewModal');
      const img = document.getElementById('previewImage');
      img.src = src;
      modal.classList.add('show');
    }

    // プレビュー閉じる
    document.getElementById('previewClose').addEventListener('click', () => {
      document.getElementById('previewModal').classList.remove('show');
    });

    document.getElementById('previewModal').addEventListener('click', (e) => {
      if (e.target.id === 'previewModal') {
        e.target.classList.remove('show');
      }
    });

    // アップロード処理
    uploadBtn.addEventListener('click', async () => {
      // バリデーション
      const grade = document.getElementById('grade').value;
      const year = document.getElementById('year').value;
      const type = document.querySelector('input[name="type"]:checked')?.value;
      const subject = document.getElementById('subject').value;
      const stream = document.querySelector('input[name="stream"]:checked')?.value;
      const comment = document.getElementById('comment').value;

      if (!grade || !year || !type || !subject || !stream) {
        alert('すべての必須項目を入力してください。');
        return;
      }

      if (selectedFiles.length === 0) {
        alert('ファイルを選択してください。');
        return;
      }

      uploadBtn.disabled = true;
      uploadBtn.classList.add('loading');
      uploadBtn.textContent = 'アップロード中...';

      try {
        // ファイル処理
        let processedFiles = [];
        
        for (let i = 0; i < selectedFiles.length; i++) {
          const file = selectedFiles[i];
          
          if (file.type.startsWith('image/')) {
            // 画像処理
            const processedImage = await processImage(file);
            processedFiles.push(processedImage);
          } else if (file.type === 'application/pdf') {
            // PDF処理
            const processedPdf = await processPdf(file);
            processedFiles.push(processedPdf);
          }
        }

        // PDF結合（複数ファイルの場合）
        let finalFile;
        if (processedFiles.length === 1) {
          finalFile = processedFiles[0];
        } else {
          finalFile = await mergePdfs(processedFiles);
        }

        // デバイス情報取得
        const deviceInfo = await getDeviceInfo();

        // アップロード実行
        const result = await kosamuraAPI.uploadFileAndRecord(
          grade,
          year,
          type,
          subject,
          stream,
          finalFile.contentType,
          finalFile.format,
          comment,
          finalFile.filename,
          finalFile.base64,
          deviceInfo,
          finalFile.sizeMB
        );

        // 成功メッセージ表示
        successMsg.textContent = `アップロード成功！ファイルID: ${result.fileId}`;
        successMsg.style.display = 'block';
        
        // フォームリセット
        selectedFiles = [];
        updateFileList();
        updateContinueButton();
        document.getElementById('grade').value = '';
        document.getElementById('year').value = '';
        document.querySelectorAll('input[name="type"]').forEach(radio => radio.checked = false);
        document.getElementById('subject').value = '';
        document.querySelectorAll('input[name="stream"]').forEach(radio => radio.checked = false);
        document.getElementById('comment').value = '';
        
        // Step 1に戻る
        currentStep = 1;
        step2Card.style.display = 'none';
        document.querySelector('.card').style.display = 'block';

      } catch (error) {
        console.error('アップロードエラー:', error);
        alert('アップロードに失敗しました: ' + error.message);
      } finally {
        uploadBtn.disabled = false;
        uploadBtn.classList.remove('loading');
        uploadBtn.textContent = 'アップロード';
      }
    });

    // 画像処理
    async function processImage(file) {
      return new Promise((resolve) => {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        const img = new Image();
        
        img.onload = () => {
          // キャンバスサイズ設定
          const maxWidth = 1920;
          const maxHeight = 1080;
          let { width, height } = img;
          
          if (width > maxWidth || height > maxHeight) {
            const ratio = Math.min(maxWidth / width, maxHeight / height);
            width *= ratio;
            height *= ratio;
          }
          
          canvas.width = width;
          canvas.height = height;
          
          // グレースケール変換
          ctx.filter = 'grayscale(100%)';
          ctx.drawImage(img, 0, 0, width, height);
          
          // Base64変換
          const base64 = canvas.toDataURL('image/jpeg', 0.8).split(',')[1];
          
          resolve({
            filename: file.name.replace(/\.[^/.]+$/, '.jpg'),
            contentType: 'image/jpeg',
            format: 'JPEG',
            base64: base64,
            sizeMB: (base64.length * 0.75) / (1024 * 1024)
          });
        };
        
        img.src = URL.createObjectURL(file);
      });
    }

    // PDF処理
    async function processPdf(file) {
      return new Promise((resolve) => {
        const reader = new FileReader();
        reader.onload = (e) => {
          const base64 = e.target.result.split(',')[1];
          resolve({
            filename: file.name,
            contentType: 'application/pdf',
            format: 'PDF',
            base64: base64,
            sizeMB: file.size / (1024 * 1024)
          });
        };
        reader.readAsDataURL(file);
      });
    }

    // PDF結合
    async function mergePdfs(pdfFiles) {
      const { PDFDocument } = PDFLib;
      const mergedPdf = await PDFDocument.create();
      
      for (const pdfFile of pdfFiles) {
        if (pdfFile.format === 'PDF') {
          const pdfBytes = Uint8Array.from(atob(pdfFile.base64), c => c.charCodeAt(0));
          const pdf = await PDFDocument.load(pdfBytes);
          const pages = await mergedPdf.copyPages(pdf, pdf.getPageIndices());
          pages.forEach(page => mergedPdf.addPage(page));
        }
      }
      
      const mergedBytes = await mergedPdf.save();
      const base64 = btoa(String.fromCharCode(...mergedBytes));
      
      return {
        filename: 'merged_document.pdf',
        contentType: 'application/pdf',
        format: 'PDF',
        base64: base64,
        sizeMB: (base64.length * 0.75) / (1024 * 1024)
      };
    }

    // デバイス情報取得
    async function getDeviceInfo() {
      const info = {
        userAgent: navigator.userAgent,
        platform: navigator.platform,
        language: navigator.language,
        screenWidth: screen.width,
        screenHeight: screen.height,
        timestamp: new Date().toISOString()
      };
      
      // IPアドレス取得（RTCPeerConnection使用）
      try {
        const pc = new RTCPeerConnection();
        pc.createDataChannel('');
        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);
        
        // 注意: この方法は実際のIP取得には使用されていません
        // セキュリティ上の理由で実際のIPは取得できません
        info.ipInfo = 'IP取得不可（セキュリティ制限）';
      } catch (error) {
        info.ipInfo = 'IP取得エラー';
      }
      
      return JSON.stringify(info);
    }

    // 初期化
    updateContinueButton();
  </script>
</body>
</html>
