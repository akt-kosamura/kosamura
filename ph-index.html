<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>考査村 - スマートフォン版</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    :root {
      --bg-page: linear-gradient(135deg, #f0f0f5 0%, #e8e8ee 100%);
      --bg-card: #ffffff;
      --accent: #0071e3;
      --accent-hover: #005bb5;
      --radius: 12px;
      --transition: 0.3s cubic-bezier(.4,0,.2,1);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg-page);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #1d1d20;
      padding: 16px;
      min-height: 100vh;
    }
    .container {
      max-width: 100%;
      margin: 0 auto;
    }
    .header {
      text-align: center;
      margin-bottom: 32px;
      padding: 20px 0;
    }
    .site-title {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: var(--accent);
      margin-bottom: 8px;
    }
    .site-subtitle {
      font-size: 1rem;
      color: #6e6e73;
      margin-bottom: 16px;
    }
    .description {
      font-size: 0.9rem;
      color: #6e6e73;
      line-height: 1.5;
      margin-bottom: 24px;
    }
    .btn {
      display: block;
      width: 100%;
      background: var(--accent);
      color: white;
      border: none;
      padding: 16px 24px;
      border-radius: 12px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.3s;
      text-decoration: none;
      text-align: center;
      margin-bottom: 16px;
    }
    .btn:hover {
      background: var(--accent-hover);
    }
    .btn-secondary {
      background: #6c757d;
    }
    .btn-secondary:hover {
      background: #5a6268;
    }
    .card {
      background: var(--bg-card);
      border-radius: 16px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.1);
      padding: 24px;
      margin-bottom: 20px;
      transition: box-shadow var(--transition);
    }
    .card:hover {
      box-shadow: 0 8px 32px rgba(0,0,0,0.15);
    }
    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 24px;
    }
    .stat-item {
      text-align: center;
      padding: 16px;
      background: #f8f9fa;
      border-radius: 12px;
    }
    .stat-number {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--accent);
      display: block;
    }
    .stat-label {
      font-size: 0.9rem;
      color: #6e6e73;
      margin-top: 4px;
    }
    .recent-posts {
      margin-top: 24px;
    }
    .post-item {
      border: 1px solid #e1e1e1;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
      background: #f8f9fa;
    }
    .post-title {
      font-weight: 600;
      color: var(--accent);
      margin-bottom: 8px;
      word-break: break-word;
    }
    .post-meta {
      font-size: 0.9rem;
      color: #6e6e73;
      margin-bottom: 8px;
    }
    .post-actions {
      display: flex;
      gap: 12px;
      align-items: center;
    }
    .action-btn {
      background: none;
      border: 1px solid #e1e1e1;
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .action-btn:hover {
      background: #e8ecf2;
    }
    .action-btn.liked {
      background: #d0e4fd;
      border-color: var(--accent);
      color: var(--accent);
    }
    .action-btn.bad {
      background: #f8d7da;
      border-color: #dc3545;
      color: #dc3545;
    }
    .loading {
      text-align: center;
        padding: 20px;
      color: #6c757d;
    }
    .error {
      color: #dc3545;
      background: #f8d7da;
      border: 1px solid #f5c6cb;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 16px;
    }
    .footer {
      text-align: center;
      margin-top: 32px;
      padding-top: 24px;
      border-top: 1px solid #e1e1e1;
      color: #6e6e73;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1 class="site-title">考査村</h1>
      <p class="site-subtitle">秋高生のための過去問共有サイト</p>
      <p class="description">
        過去問や参考資料を共有して、みんなで勉強をサポートし合いましょう。
        スマートフォンからでも簡単にアップロード・検索ができます。
      </p>
          </div>

    <div class="card">
      <div class="stats">
        <div class="stat-item">
          <span class="stat-number" id="totalPosts">-</span>
          <span class="stat-label">投稿数</span>
              </div>
        <div class="stat-item">
          <span class="stat-number" id="totalLikes">-</span>
          <span class="stat-label">いいね数</span>
              </div>
              </div>

      <a href="gas-upload.html" class="btn">📤 ファイルをアップロード</a>
      <a href="gas-search.html" class="btn btn-secondary">🔍 ファイルを検索</a>
      <a href="gas-share.html" class="btn btn-secondary">📢 サイトを共有</a>
    </div>

    <div class="card">
      <h2>最近の投稿</h2>
      <div id="recentPosts" class="recent-posts">
        <div class="loading">読み込み中...</div>
      </div>
    </div>

    <div class="footer">
      <p>© 2024 考査村 - 秋高生のための過去問共有サイト</p>
      <p>スマートフォン版</p>
      </div>
    </div>

  <script src="js/api.js"></script>
  <script>
    const GAS_URL = 'https://script.google.com/macros/s/1m8CK9hflCdy-Ll805tQRC_1N5AsoFp9disC9B0F8hzeDifdTSEGoBzQj/exec';
    
    // GAS URLを設定
    if (window.kosamuraAPI) {
      window.kosamuraAPI.baseURL = GAS_URL;
    }

    let posts = [];

    // ページ読み込み時にデータを取得
    window.addEventListener('load', loadData);

    async function loadData() {
      try {
        posts = await window.kosamuraAPI.getData();
        updateStats();
        displayRecentPosts();
      } catch (error) {
        console.error('データ読み込みエラー:', error);
        document.getElementById('recentPosts').innerHTML = '<div class="error">データの読み込みに失敗しました</div>';
      }
    }

    function updateStats() {
      const totalPosts = posts.length;
      const totalLikes = posts.reduce((sum, post) => sum + (post.likes || 0), 0);
      
      document.getElementById('totalPosts').textContent = totalPosts;
      document.getElementById('totalLikes').textContent = totalLikes;
    }

    function displayRecentPosts() {
      const recentPosts = document.getElementById('recentPosts');
      
      if (posts.length === 0) {
        recentPosts.innerHTML = '<div class="loading">まだ投稿がありません</div>';
        return;
      }

      // 最新の5件を表示
      const recentPostsData = posts.slice(0, 5);
      
      const postsHTML = recentPostsData.map(post => `
        <div class="post-item">
          <div class="post-title">${post.filename || '無題'}</div>
          <div class="post-meta">
            ${post.grade}年 ${post.subject} - ${post.type} (${post.year}年)
          </div>
          <div class="post-actions">
            <button class="action-btn ${post.userLiked ? 'liked' : ''}" onclick="toggleLike('${post.id}')">
              👍 ${post.likes || 0}
            </button>
            <button class="action-btn ${post.userBad ? 'bad' : ''}" onclick="toggleBad('${post.id}')">
              👎 ${post.bad || 0}
            </button>
            <a href="${post.url}" target="_blank" class="action-btn">
              📄 表示
            </a>
          </div>
        </div>
      `).join('');

      recentPosts.innerHTML = postsHTML;
    }

    async function toggleLike(id) {
      try {
        const post = posts.find(p => p.id === id);
        if (!post) return;

        if (post.userLiked) {
          await window.kosamuraAPI.unlike(id);
          post.likes = Math.max(0, (post.likes || 0) - 1);
          post.userLiked = false;
      } else {
          await window.kosamuraAPI.like(id);
          post.likes = (post.likes || 0) + 1;
          post.userLiked = true;
        }

        updateStats();
        displayRecentPosts();
      } catch (error) {
        console.error('いいねエラー:', error);
        alert('いいねの処理に失敗しました');
      }
    }

    async function toggleBad(id) {
      try {
        const post = posts.find(p => p.id === id);
        if (!post) return;

        if (post.userBad) {
          await window.kosamuraAPI.unbad(id);
          post.bad = Math.max(0, (post.bad || 0) - 1);
          post.userBad = false;
        } else {
          await window.kosamuraAPI.bad(id);
          post.bad = (post.bad || 0) + 1;
          post.userBad = true;
        }

        displayRecentPosts();
      } catch (error) {
        console.error('バッドエラー:', error);
        alert('バッドの処理に失敗しました');
      }
    }
  </script>
</body>
</html>
