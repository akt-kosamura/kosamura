<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ハッシュ値変換ツール - 考査村</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: 'Courier New', monospace;
      margin: 0;
      padding: 20px;
      background: #000080;
      color: #00ff00;
      line-height: 1.4;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
      background: #000000;
      border: 2px solid #00ff00;
      padding: 20px;
      box-shadow: 0 0 20px #00ff00;
    }
    h1 {
      text-align: center;
      margin-bottom: 20px;
      text-shadow: 0 0 10px #00ff00;
      border-bottom: 1px solid #00ff00;
      padding-bottom: 10px;
    }
    .form-group {
      margin-bottom: 15px;
    }
    label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
    }
    input[type="password"] {
      width: 100%;
      padding: 8px;
      background: #000000;
      border: 1px solid #00ff00;
      color: #00ff00;
      font-family: 'Courier New', monospace;
      font-size: 14px;
      box-sizing: border-box;
    }
    input[type="password"]:focus {
      outline: none;
      border-color: #ffff00;
      box-shadow: 0 0 10px #ffff00;
    }
    button {
      width: 100%;
      padding: 10px;
      background: #000000;
      color: #00ff00;
      border: 2px solid #00ff00;
      font-family: 'Courier New', monospace;
      font-size: 16px;
      cursor: pointer;
      margin-bottom: 15px;
      text-transform: uppercase;
    }
    button:hover {
      background: #00ff00;
      color: #000000;
      box-shadow: 0 0 15px #00ff00;
    }
    .result {
      border: 1px solid #00ff00;
      padding: 15px;
      margin-top: 15px;
      background: #001100;
    }
    .hash-display {
      font-family: 'Courier New', monospace;
      background: #000000;
      padding: 10px;
      border: 1px solid #00ff00;
      word-break: break-all;
      margin-top: 10px;
      font-size: 12px;
      color: #ffff00;
    }
    .instructions {
      border: 1px solid #00ff00;
      padding: 10px;
      margin-bottom: 15px;
      background: #001100;
      font-size: 12px;
    }
    .warning {
      border: 1px solid #ff0000;
      color: #ff0000;
      padding: 10px;
      margin-bottom: 15px;
      background: #110000;
      font-size: 12px;
    }
    .nav-links {
      text-align: center;
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid #00ff00;
    }
    .nav-links a {
      color: #00ff00;
      text-decoration: none;
      margin: 0 10px;
    }
    .nav-links a:hover {
      color: #ffff00;
      text-shadow: 0 0 5px #ffff00;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>ハッシュ値変換ツール</h1>
    
    <div class="instructions">
      <strong>使用方法:</strong> パスワードを入力 → ハッシュ生成 → スプレッドシートのシート2のA1に貼り付け
    </div>
    
    <div class="warning">
      <strong>注意:</strong> ローカル処理。外部送信なし。
    </div>
    
    <div class="form-group">
      <label for="password">パスワード:</label>
      <input type="password" id="password" placeholder="パスワードを入力">
    </div>
    
    <button onclick="generateHash()">ハッシュ生成</button>
    
    <div id="result" class="result" style="display: none;">
      <strong>生成されたハッシュ値:</strong>
      <div id="hashDisplay" class="hash-display"></div>
      <button onclick="copyHash()" style="margin-top: 10px;">コピー</button>
    </div>
    
    <div class="nav-links">
      <a href="admin.html">← 管理画面に戻る</a>
    </div>
  </div>

  <script>
    async function generateHash() {
      const password = document.getElementById('password').value;
      
      if (!password) {
        alert('パスワードを入力してください');
        return;
      }
      
      try {
        const encoder = new TextEncoder();
        const data = encoder.encode(password);
        const hashBuffer = await crypto.subtle.digest('SHA-256', data);
        const hashArray = Array.from(new Uint8Array(hashBuffer));
        const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        
        document.getElementById('hashDisplay').textContent = hashHex;
        document.getElementById('result').style.display = 'block';
        document.getElementById('password').value = '';
        
      } catch (error) {
        console.error('ハッシュ生成エラー:', error);
        alert('ハッシュの生成に失敗しました');
      }
    }
    
    function copyHash() {
      const hashText = document.getElementById('hashDisplay').textContent;
      
      if (navigator.clipboard) {
        navigator.clipboard.writeText(hashText).then(() => {
          alert('ハッシュ値をコピーしました');
        }).catch(() => {
          fallbackCopyTextToClipboard(hashText);
        });
      } else {
        fallbackCopyTextToClipboard(hashText);
      }
    }
    
    function fallbackCopyTextToClipboard(text) {
      const textArea = document.createElement('textarea');
      textArea.value = text;
      textArea.style.position = 'fixed';
      textArea.style.left = '-999999px';
      textArea.style.top = '-999999px';
      document.body.appendChild(textArea);
      textArea.focus();
      textArea.select();
      
      try {
        document.execCommand('copy');
        alert('ハッシュ値をコピーしました');
      } catch (err) {
        console.error('コピーに失敗しました:', err);
        alert('コピーに失敗しました。手動でコピーしてください。');
      }
      
      document.body.removeChild(textArea);
    }
    
    document.getElementById('password').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        generateHash();
      }
    });
  </script>
</body>
</html>
