<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>PDFアップロード - 秋高考査村</title>
  <meta name="viewport" content="width=1200" />
  <style>
    html { overflow-y: scroll; }
    :root {
      --bg-page: linear-gradient(135deg, #f0f0f5 0%, #e8e8ee 100%);
      --bg-card: #ffffff;
      --accent: #0071e3;
      --accent-hover: #005bb5;
      --radius: 12px;
      --transition: 0.3s cubic-bezier(.4,0,.2,1);
      font-size: 18px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg-page);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #1d1d20;
      padding-top: 64px;
      padding-left: 32px;
      padding-right: 32px;
    }
    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      background: var(--bg-card);
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      z-index: 1000;
    }
    .header-inner {
      max-width: 1200px; margin: 0 auto;
      padding: 16px 24px;
      display: flex; align-items: center;
      justify-content: space-between;
      flex-wrap: wrap; gap: 16px;
    }
    .header-title {
      display: flex;
      gap: 19px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-start;
    }
    .site-title {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: #0071e3;
      display: inline-block;
    }
    .site-subtitle { font-size: 0.9rem; color: #6e6e73; }
    nav { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; }
    nav ul { display: flex; justify-content: center; list-style: none; white-space: nowrap; }
    nav a {
      display: block; padding: 8px 16px;
      color: #1d1d20; text-decoration: none;
      border-bottom: 1px solid #ccc;
      transition: background 0.2s;
      font-size: 15px;
    }
    nav a:hover { background: #e8ecf2; }
    nav a.active {
      background: #d0e4fd;
      border-bottom: 3px solid var(--accent);
    }
    main {
      max-width: 1400px;
      margin: 96px auto 32px;
      padding-left: 32px;
      padding-right: 32px;
      box-sizing: border-box;
    }
    h1 {
      text-align: center;
      font-size: 2rem;
      margin-bottom: 1rem;
      background: linear-gradient(90deg, var(--accent), #5ac8fa);
      -webkit-background-clip: text;
      color: transparent;
    }
    .subtitle {
      text-align: center; font-size: 19px;
      margin-bottom: 32px; color: #6e6e73;
    }
    .card {
      background: var(--bg-card);
      border-radius: 12px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.1);
      max-width: 800px;
      width: 100%;
      margin: 0 auto 10px auto;
      padding: 24px 40px 10px 40px;
      transition: box-shadow var(--transition);
      box-sizing: border-box;
      word-break: break-word;
      overflow: hidden;
    }
    .card:hover { box-shadow: 0 8px 32px rgba(0,0,0,0.15); }
    .form-group {
      margin-bottom: 24px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .form-group label {
      font-weight: 600;
      color: #1d1d20;
      font-size: 16px;
    }
    .form-group input,
    .form-group select,
    .form-group textarea {
      padding: 12px 16px;
      border: 2px solid #e5e5e7;
      border-radius: 8px;
      font-size: 16px;
      transition: border-color var(--transition);
      background: #ffffff;
    }
    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0, 113, 227, 0.1);
    }
    .form-group textarea {
      resize: vertical;
      min-height: 100px;
      font-family: inherit;
    }
    .file-input-wrapper {
      position: relative;
      display: inline-block;
      width: 100%;
    }
    .file-input {
      position: absolute;
      opacity: 0;
      width: 100%;
      height: 100%;
      cursor: pointer;
    }
    .file-input-label {
      display: block;
      padding: 16px;
      border: 2px dashed #e5e5e7;
      border-radius: 8px;
      text-align: center;
      cursor: pointer;
      transition: all var(--transition);
      background: #f9f9f9;
    }
    .file-input-label:hover {
      border-color: var(--accent);
      background: #f0f8ff;
    }
    .file-input:focus + .file-input-label {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0, 113, 227, 0.1);
    }
    .submit-btn {
      background: var(--accent);
      color: white;
      border: none;
      padding: 16px 32px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background var(--transition);
      width: 100%;
      margin-top: 16px;
    }
    .submit-btn:hover {
      background: var(--accent-hover);
    }
    .submit-btn:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    .loading {
      display: none;
      text-align: center;
      margin: 20px 0;
    }
    .loading.show {
      display: block;
    }
    .spinner {
      border: 3px solid #f3f3f3;
      border-top: 3px solid var(--accent);
      border-radius: 50%;
      width: 30px;
      height: 30px;
      animation: spin 1s linear infinite;
      margin: 0 auto 10px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .success-message {
      display: none;
      background: #d4edda;
      color: #155724;
      padding: 16px;
      border-radius: 8px;
      margin-top: 16px;
      text-align: center;
    }
    .error-message {
      display: none;
      background: #f8d7da;
      color: #721c24;
      padding: 16px;
      border-radius: 8px;
      margin-top: 16px;
      text-align: center;
    }
    .file-info {
      margin-top: 8px;
      font-size: 14px;
      color: #6e6e73;
    }
    .file-size {
      font-weight: 600;
      color: var(--accent);
    }
    @media (max-width: 768px) {
      body {
        padding-left: 16px;
        padding-right: 16px;
      }
      main {
        padding-left: 16px;
        padding-right: 16px;
      }
      .card {
        padding: 20px;
      }
      h1 {
        font-size: 1.5rem;
      }
      .subtitle {
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-inner">
      <div class="header-title">
        <div>
          <div class="site-title">考査村</div>
          <div class="site-subtitle">秋田高校 考査問題共有プラットフォーム</div>
        </div>
      </div>
      <nav>
        <ul>
          <li><a href="gas-index.html">ホーム</a></li>
          <li><a href="gas-upload.html" class="active">アップロード</a></li>
          <li><a href="gas-search.html">検索</a></li>
          <li><a href="gas-share.html">共有</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main>
    <h1>ファイルアップロード</h1>
    <p class="subtitle">過去の考査問題や資料を共有しましょう</p>

    <div class="card">
      <form id="uploadForm">
        <div class="form-group">
          <label for="grade">学年 *</label>
          <select id="grade" name="grade" required>
            <option value="">選択してください</option>
            <option value="1年">1年</option>
            <option value="2年">2年</option>
            <option value="3年">3年</option>
          </select>
        </div>

        <div class="form-group">
          <label for="year">年度 *</label>
          <select id="year" name="year" required>
            <option value="">選択してください</option>
            <option value="2024">2024年度</option>
            <option value="2023">2023年度</option>
            <option value="2022">2022年度</option>
            <option value="2021">2021年度</option>
            <option value="2020">2020年度</option>
          </select>
        </div>

        <div class="form-group">
          <label for="type">種類 *</label>
          <select id="type" name="type" required>
            <option value="">選択してください</option>
            <option value="中間考査">中間考査</option>
            <option value="期末考査">期末考査</option>
            <option value="実力考査">実力考査</option>
            <option value="模擬考査">模擬考査</option>
            <option value="その他">その他</option>
          </select>
        </div>

        <div class="form-group">
          <label for="subject">科目 *</label>
          <select id="subject" name="subject" required>
            <option value="">選択してください</option>
            <option value="国語">国語</option>
            <option value="数学">数学</option>
            <option value="英語">英語</option>
            <option value="理科">理科</option>
            <option value="社会">社会</option>
            <option value="その他">その他</option>
          </select>
        </div>

        <div class="form-group">
          <label for="stream">文理区分 *</label>
          <select id="stream" name="stream" required>
            <option value="">選択してください</option>
            <option value="文系">文系</option>
            <option value="理系">理系</option>
            <option value="共通">共通</option>
          </select>
        </div>

        <div class="form-group">
          <label for="contentType">内容 *</label>
          <select id="contentType" name="contentType" required>
            <option value="">選択してください</option>
            <option value="問題">問題</option>
            <option value="解説">解説</option>
            <option value="解答">解答</option>
            <option value="問題＆解説">問題＆解説</option>
            <option value="その他">その他</option>
          </select>
        </div>

        <div class="form-group">
          <label for="fileFormat">ファイル形式 *</label>
          <select id="fileFormat" name="fileFormat" required>
            <option value="">選択してください</option>
            <option value="PDF">PDF</option>
            <option value="Word">Word</option>
            <option value="Excel">Excel</option>
            <option value="一太郎">一太郎</option>
            <option value="画像">画像</option>
            <option value="その他">その他</option>
          </select>
        </div>

        <div class="form-group">
          <label for="comment">コメント</label>
          <textarea id="comment" name="comment" placeholder="追加の情報があれば入力してください"></textarea>
        </div>

        <div class="form-group">
          <label for="file">ファイル *</label>
          <div class="file-input-wrapper">
            <input type="file" id="file" name="file" class="file-input" accept=".pdf,.doc,.docx,.xls,.xlsx,.jpg,.jpeg,.png,.gif" required>
            <label for="file" class="file-input-label">
              <strong>ファイルを選択</strong><br>
              <small>PDF, Word, Excel, 画像ファイルに対応</small>
            </label>
          </div>
          <div class="file-info" id="fileInfo"></div>
        </div>

        <button type="submit" class="submit-btn" id="submitBtn">アップロード</button>
      </form>

      <div class="loading" id="loading">
        <div class="spinner"></div>
        <p>アップロード中...</p>
      </div>

      <div class="success-message" id="successMessage">
        <strong>アップロード完了！</strong><br>
        ファイルが正常にアップロードされました。
      </div>

      <div class="error-message" id="errorMessage">
        <strong>エラーが発生しました</strong><br>
        <span id="errorText"></span>
      </div>
    </div>
  </main>

  <script src="js/gas-api.js"></script>
  <script src="js/api.js"></script>
  <script>
    // GASのURLを設定
    const GAS_URL = 'https://script.google.com/macros/s/YOUR_GAS_SCRIPT_ID/exec';
    
    // APIクライアントをGAS用に設定
    if (window.kosamuraAPI) {
      window.kosamuraAPI.baseURL = GAS_URL;
    }

    document.addEventListener('DOMContentLoaded', function() {
      const form = document.getElementById('uploadForm');
      const fileInput = document.getElementById('file');
      const fileInfo = document.getElementById('fileInfo');
      const submitBtn = document.getElementById('submitBtn');
      const loading = document.getElementById('loading');
      const successMessage = document.getElementById('successMessage');
      const errorMessage = document.getElementById('errorMessage');
      const errorText = document.getElementById('errorText');

      // ファイル選択時の処理
      fileInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
          const sizeMB = (file.size / (1024 * 1024)).toFixed(2);
          fileInfo.innerHTML = `
            選択されたファイル: <strong>${file.name}</strong><br>
            サイズ: <span class="file-size">${sizeMB} MB</span>
          `;
        } else {
          fileInfo.innerHTML = '';
        }
      });

      // フォーム送信時の処理
      form.addEventListener('submit', async function(e) {
        e.preventDefault();

        const formData = new FormData(form);
        const file = formData.get('file');

        if (!file) {
          showError('ファイルが選択されていません');
          return;
        }

        // ファイルサイズチェック（50MB制限）
        const fileSizeMB = file.size / (1024 * 1024);
        if (fileSizeMB > 50) {
          showError('ファイルサイズが50MBを超えています');
          return;
        }

        // デバイス情報を取得
        const deviceInfo = {
          userAgent: navigator.userAgent,
          platform: navigator.platform,
          screenWidth: screen.width,
          screenHeight: screen.height,
          windowWidth: window.innerWidth,
          windowHeight: window.innerHeight,
          publicIP: 'Unknown', // 実際のIP取得はサーバーサイドで
          privateIP: 'Unknown'
        };

        // ファイルをBase64に変換
        const reader = new FileReader();
        reader.onload = async function(e) {
          const base64 = e.target.result.split(',')[1]; // データURLからBase64部分を抽出

          try {
            showLoading(true);
            hideMessages();

            // GAS互換APIでアップロード
            const url = await google.script.run.uploadFileAndRecord(
              formData.get('grade'),
              formData.get('year'),
              formData.get('type'),
              formData.get('subject'),
              formData.get('stream'),
              formData.get('contentType'),
              formData.get('fileFormat'),
              formData.get('comment'),
              file.name,
              base64,
              deviceInfo,
              fileSizeMB
            );

            showSuccess();
            form.reset();
            fileInfo.innerHTML = '';

          } catch (error) {
            console.error('Upload error:', error);
            showError('アップロードに失敗しました: ' + error.message);
          } finally {
            showLoading(false);
          }
        };

        reader.readAsDataURL(file);
      });

      function showLoading(show) {
        if (show) {
          loading.classList.add('show');
          submitBtn.disabled = true;
        } else {
          loading.classList.remove('show');
          submitBtn.disabled = false;
        }
      }

      function showSuccess() {
        successMessage.style.display = 'block';
        errorMessage.style.display = 'none';
        setTimeout(() => {
          successMessage.style.display = 'none';
        }, 5000);
      }

      function showError(message) {
        errorText.textContent = message;
        errorMessage.style.display = 'block';
        successMessage.style.display = 'none';
        setTimeout(() => {
          errorMessage.style.display = 'none';
        }, 5000);
      }

      function hideMessages() {
        successMessage.style.display = 'none';
        errorMessage.style.display = 'none';
      }
    });
  </script>
</body>
</html>
