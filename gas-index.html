<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>考査村</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        .container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
            max-width: 600px;
            width: 100%;
        }
        
        h1 {
            color: #333;
            margin-bottom: 30px;
            font-size: 2.5em;
        }
        
        .description {
            color: #666;
            margin-bottom: 40px;
            line-height: 1.6;
        }
        
        .button-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 30px;
        }
        
        .btn {
            padding: 15px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }
        
        .btn-primary {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
        }
        
        .btn-secondary {
            background: #f8f9fa;
            color: #333;
            border: 2px solid #dee2e6;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        .admin-link {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }
        
        .admin-link a {
            color: #999;
            text-decoration: none;
            font-size: 14px;
        }
        
        .admin-link a:hover {
            color: #666;
        }
        
        @media (max-width: 768px) {
            .container {
                margin: 20px;
                padding: 30px 20px;
            }
            
            h1 {
                font-size: 2em;
            }
            
            .button-group {
                gap: 10px;
            }
            
            .btn {
                padding: 12px 25px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>考査村</h1>
        <div class="description">
            過去の考査問題や資料を共有・検索できるプラットフォームです。<br>
            学年・年度・科目別に整理された問題集を簡単に見つけることができます。
        </div>
        
        <div class="button-group">
            <a href="gas-upload.html" class="btn btn-primary">問題をアップロード</a>
            <a href="gas-search.html" class="btn btn-secondary">問題を検索</a>
            <a href="gas-share.html" class="btn btn-secondary">共有・拡散</a>
        </div>
        
        <div class="admin-link">
            <a href="gas-admin.html">管理者ページ</a>
        </div>
    </div>

    <script>
        // GASのURLを設定
        const GAS_URL = 'https://script.google.com/macros/s/YOUR_GAS_SCRIPT_ID/exec';
        
        // APIクライアントをGAS用に設定
        if (window.kosamuraAPI) {
            window.kosamuraAPI.baseURL = GAS_URL;
        }
        
        // スマートフォン判定
        function isMobile() {
            return /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        }
        
        // スマートフォンの場合は専用ページにリダイレクト
        if (isMobile()) {
            window.location.href = 'gas-ph-index.html';
        }
    </script>
</body>
</html>
