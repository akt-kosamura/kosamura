<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>共有・拡散 - 秋高考査村</title>
  <meta name="viewport" content="width=1200" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="../assets/css/common.css">
  <link rel="stylesheet" href="../assets/css/pages/share.css">
</head>

<body>
  <header>
    <div class="header-inner">
      <div class="header-title">
        <div class="site-title">秋高考査村</div>
        <div class="site-subtitle">無料・匿名で使える過去問共有サイト</div>
      </div>
      <div id="freeModeStatus" class="free-mode-status"></div>
      <nav>
        <ul>
          <li><a href="../index.html">ホーム</a></li>
          <li><a href="upload.html">アップロード</a></li>
          <li><a href="search.html">問題データベース</a></li>
          <li><a href="share.html" class="active">共有・拡散</a></li>
          <li><a href="https://c.kuku.lu/hmc853pz" target="_blank">掲示板</a></li>
          <li><a href="https://forms.gle/ZWtQCvecH4eZtTEU7" target="_blank">報告・問い合わせ</a></li>
        </ul>
      </nav>
    </div>
  </header>
  <main>
    <h1>共有・拡散</h1>
    <div class="subtitle">このサイトを友達やクラスに広めてください</div>
    <div class="card">
      <div class="share-description">
        秋高考査村を友達やクラス、学校に広めて<br>みんなで過去問を共有しよう
      </div>
      <div class="url-container">
        <input type="text" id="siteUrl" class="share-url-input" value="https://akt-kosamura.github.io/kosamura/" readonly>
      </div>
      <div class="copy-button-container">
        <button class="copy-btn" id="copyBtn" onclick="copyButton('siteUrl')">
          <i class="fa-regular fa-copy"></i> コピー
        </button>
      </div>
      <div class="toast-container">
        <div id="copyToast" class="copy-toast">コピーしました！</div>
      </div>
      <div class="share-buttons">
        <a
          id="twitterBtn"
          href="https://twitter.com/intent/tweet?text=無料で使える過去問共有サイト「秋高考査村」%0A考査問題に限らず、テスト問題をアップロード・閲覧できるサービスです。%0A%0Ahttps://akt-kosamura.github.io/kosamura/%0A%0A%23考査村%20%23過去問"
          class="share-btn"
          target="_blank" rel="noopener noreferrer"
        >
          <i class="fa-brands fa-twitter"></i><span>ツイート</span>
        </a>
        <button class="share-btn" id="nativeShareBtn">
          <i class="fa-solid fa-share-nodes"></i><span>共有</span>
        </button>
      </div>
      <button class="print-btn" onclick="window.print()">
        <i class="fa-solid fa-print"></i> 印刷して配布
      </button>
      <div class="note">
        ※Googleドライブのファイルリンクは後日掲載予定です
      </div>
    </div>
  </main>
  <div class="copyright-note">Copyright© 2020 考査村 All Rights Reserved.</div>

  <script>
    // フリーモードカウントダウン
    function isInFreeMode() {
      const freeModeEnd = localStorage.getItem('freeModeEnd')
      if (!freeModeEnd) return false
      return new Date().getTime() < parseInt(freeModeEnd)
    }
    function updateFreeModeStatus() {
      const status = document.getElementById('freeModeStatus')
      if (!status) return
      if (isInFreeMode()) {
        const freeModeEnd = parseInt(localStorage.getItem('freeModeEnd'))
        const remaining = freeModeEnd - new Date().getTime()
        if (remaining <= 0) {
          localStorage.removeItem('freeModeEnd')
          status.textContent = '問題アップロードで広告フリー'
          status.className = 'free-mode-status ad'
          return
        }
        const hours   = Math.floor(remaining / (60 * 60 * 1000))
        const minutes = Math.floor((remaining % (60 * 60 * 1000)) / (60 * 1000))
        const seconds = Math.floor((remaining % (60 * 1000)) / 1000)
        status.textContent = `フリーモード ${hours}時間${minutes}分${seconds}秒`
        status.className = 'free-mode-status free'
      } else {
        status.textContent = '問題アップロードで広告フリー'
        status.className = 'free-mode-status ad'
      }
    }
    document.addEventListener('DOMContentLoaded', () => {
      updateFreeModeStatus()
      setInterval(updateFreeModeStatus, 1000)
    })
  </script>

  <script>
    function copyButton(elementId) {
      var element = document.getElementById(elementId);
      navigator.clipboard.writeText(element.value || element.textContent);
      // トースト表示
      var toast = document.getElementById('copyToast');
      toast.style.display = 'block';
      setTimeout(function() { toast.style.opacity = 1; }, 10);
      setTimeout(function() {
        toast.style.opacity = 0;
        setTimeout(function() { toast.style.display = 'none'; }, 400);
      }, 1600);
      // ボタンデザイン変更
      var btn = document.getElementById('copyBtn');
      var originalBg = btn.style.background;
      var originalColor = btn.style.color;
      btn.style.background = '#e0e0e0';
      btn.style.color = '#0071e3';
      btn.innerHTML = '<i class="fa-regular fa-copy"></i> コピーしました！';
      setTimeout(function() {
        btn.style.background = originalBg;
        btn.style.color = originalColor;
        btn.innerHTML = '<i class="fa-regular fa-copy"></i> コピー';
      }, 1400);
    }
  </script>

  <script>
  document.addEventListener('DOMContentLoaded', () => {
    const urlInput  = document.getElementById('siteUrl')
    const copyBtn   = document.getElementById('copyBtn')
    const twitterBtn= document.getElementById('twitterBtn')
    const shareBtn  = document.getElementById('nativeShareBtn')
    const toast     = document.getElementById('copyToast')

    // ネイティブ共有
    shareBtn.addEventListener('click', async () => {
      const shareData = {
        title: '秋高考査村',
        text: '無料で使える問題共有サイト',
        url: urlInput.value
      }
      if (navigator.share) {
        try {
          await navigator.share(shareData)
        } catch (err) {
          console.error('共有に失敗しました', err)
        }
      } else {
        toast.textContent = 'この端末は共有非対応です。URLをコピーして使ってください'
        toast.style.display = 'block'
        setTimeout(() => { toast.style.opacity = 1 }, 10)
        setTimeout(() => {
          toast.style.opacity = 0
          setTimeout(() => {
            toast.style.display = 'none'
            toast.textContent = 'コピーしました！'
          }, 400)
        }, 2000)
      }
    })
  })
  </script>

</body>
</html>
